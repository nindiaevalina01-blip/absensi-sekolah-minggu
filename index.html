<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi GPdI Immanuel Berastagi</title>
    <!-- Tailwind CSS untuk desain modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons untuk ikon menarik -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF untuk fitur unduh PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s; }
        .btn-gradient:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4); }
        .camera-container { position: relative; overflow: hidden; border-radius: 1rem; background: #000; aspect-ratio: 4/3; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #00ff00; top: 0; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="min-h-screen">

    <!-- 1. HALAMAN LOGIN -->
    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <div class="mb-6 flex justify-center">
                <div class="p-4 bg-indigo-100 rounded-full text-indigo-600">
                    <i data-lucide="church" class="w-12 h-12"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Selamat Datang</h1>
            <p class="text-gray-500 mb-8 leading-tight">Absensi Online Sekolah Minggu<br><span class="font-semibold text-indigo-600">GPdI Immanuel Berastagi</span></p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full btn-gradient text-white py-3 rounded-xl font-semibold text-lg mt-4 shadow-lg">Masuk Sekarang</button>
            </div>
        </div>
    </div>

    <!-- 2. DASHBOARD UTAMA -->
    <div id="dashboardPage" class="hidden min-h-screen">
        <nav class="bg-white shadow-sm p-4 sticky top-0 z-10">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i data-lucide="cross" class="text-indigo-600 w-6 h-6"></i>
                    <span class="font-bold text-gray-800">SM GPdI Immanuel</span>
                </div>
                <button onclick="logout()" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-4 space-y-6 mt-4">
            <div class="bg-indigo-600 rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-2xl font-bold mb-2">Selamat Hari Minggu! 🌟</h2>
                    <p class="opacity-90">Sudahkah kamu mengabsen muridmu hari ini?</p>
                </div>
                <i data-lucide="sun" class="absolute -right-4 -bottom-4 w-32 h-32 opacity-20"></i>
            </div>

            <!-- Menu Tombol -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm">
                    <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <i data-lucide="users"></i> Pilih Kelas
                    </h3>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="showClass('Bintang')" class="p-3 bg-amber-100 text-amber-700 rounded-xl font-semibold hover:bg-amber-200 transition">Bintang</button>
                        <button onclick="showClass('Cahaya')" class="p-3 bg-blue-100 text-blue-700 rounded-xl font-semibold hover:bg-blue-200 transition">Cahaya</button>
                        <button onclick="showClass('Pra Remaja')" class="p-3 bg-purple-100 text-purple-700 rounded-xl font-semibold hover:bg-purple-200 transition">Pra Remaja</button>
                    </div>
                </div>
                
                <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col justify-center">
                    <button onclick="openModal('addMember')" class="flex items-center justify-center gap-3 bg-emerald-500 text-white p-4 rounded-xl font-bold hover:bg-emerald-600 transition shadow-md">
                        <i data-lucide="user-plus"></i> Tambah Anggota Baru
                    </button>
                    <button onclick="generateFullReport()" class="mt-3 flex items-center justify-center gap-3 bg-gray-800 text-white p-4 rounded-xl font-bold hover:bg-gray-900 transition shadow-md">
                        <i data-lucide="file-down"></i> Unduh Rekap PDF
                    </button>
                </div>
            </div>

            <!-- TAMPILAN KELAS -->
            <div id="classContainer" class="hidden space-y-4">
                <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border-l-4 border-indigo-500">
                    <h3 id="currentClassName" class="text-xl font-bold text-gray-800">Kelas: -</h3>
                    <button onclick="startScan()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-semibold">
                        <i data-lucide="scan"></i> Scan Wajah Absensi
                    </button>
                </div>
                
                <div id="studentList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Data anak sekolah minggu akan muncul di sini -->
                </div>
            </div>
        </main>
    </div>

    <!-- 3. MODAL SCAN WAJAH -->
    <div id="scanModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
        <div class="bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl">
            <div class="p-4 border-b flex justify-between items-center">
                <h4 class="font-bold">Scan Wajah Murid</h4>
                <button onclick="closeModal('scanModal')" class="text-gray-400"><i data-lucide="x"></i></button>
            </div>
            <div class="p-4">
                <div class="camera-container mb-4">
                    <video id="video" autoplay playsinline></video>
                    <div class="scan-line"></div>
                </div>
                <div id="scanStatus" class="text-center p-3 rounded-lg bg-gray-100 text-sm font-medium">
                    Mengarahkan kamera...
                </div>
                <button id="captureBtn" onclick="processScan()" class="w-full btn-gradient text-white py-3 rounded-xl font-bold mt-4 disabled:opacity-50">
                    Ambil Foto & Verifikasi
                </button>
            </div>
        </div>
    </div>

    <!-- 4. MODAL TAMBAH ANGGOTA -->
    <div id="addMemberModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-6">
            <h4 class="text-xl font-bold mb-4">Data Baru Anak Sekolah Minggu</h4>
            <div class="grid grid-cols-1 gap-4">
                <input type="text" id="newName" placeholder="Nama Lengkap" class="p-3 border rounded-xl">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="newPob" placeholder="Tempat Lahir" class="p-3 border rounded-xl">
                    <input type="date" id="newDob" class="p-3 border rounded-xl text-sm">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="newAge" placeholder="Usia" class="p-3 border rounded-xl">
                    <select id="newEducation" class="p-3 border rounded-xl">
                        <option value="">Jenjang Pendidikan</option>
                        <option value="Belum Sekolah">Belum Sekolah</option>
                        <option value="TK">TK</option>
                        <option value="SD">SD</option>
                        <option value="SMP">SMP</option>
                    </select>
                </div>
                <select id="newClass" class="p-3 border rounded-xl">
                    <option value="">Pilih Kelas SM</option>
                    <option value="Bintang">Bintang</option>
                    <option value="Cahaya">Cahaya</option>
                    <option value="Pra Remaja">Pra Remaja</option>
                </select>
                <div class="flex gap-4 mt-2">
                    <button onclick="saveMember()" class="flex-1 btn-gradient text-white py-3 rounded-xl font-bold">Simpan Data</button>
                    <button onclick="closeModal('addMemberModal')" class="px-6 py-3 bg-gray-100 rounded-xl font-bold">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notifikasi Custom -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold opacity-0 transition-all duration-300 pointer-events-none z-[100]"></div>

    <script>
        // DATA AWAL & LOGIKA DASAR
        let currentClass = "";
        let students = JSON.parse(localStorage.getItem('sm_students')) || [];
        let stream = null;

        // Inisialisasi Ikon
        lucide.createIcons();

        // 1. Fungsi Login (Statis)
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === "Admin" && pass === "Berastagi2024") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                showToast("Selamat Datang, Admin!", "bg-emerald-500");
            } else {
                showToast("Username/Password Salah!", "bg-red-500");
            }
        }

        function logout() {
            location.reload();
        }

        // 2. Fungsi UI Modal
        function openModal(type) {
            if (type === 'addMember') {
                document.getElementById('addMemberModal').classList.remove('hidden');
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            if (id === 'scanModal' && stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        // 3. Manajemen Data
        function saveMember() {
            const name = document.getElementById('newName').value;
            const dob = document.getElementById('newDob').value;
            const pob = document.getElementById('newPob').value;
            const age = document.getElementById('newAge').value;
            const edu = document.getElementById('newEducation').value;
            const cls = document.getElementById('newClass').value;

            if (!name || !cls) return showToast("Mohon lengkapi data!", "bg-amber-500");

            const newStudent = {
                id: Date.now(),
                name, dob, pob, age, edu, class: cls,
                attendance: 0,
                photo: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}` // Simulasi Foto Otomatis
            };

            students.push(newStudent);
            localStorage.setItem('sm_students', JSON.stringify(students));
            closeModal('addMemberModal');
            showToast("Data berhasil disimpan!", "bg-emerald-500");
            if (currentClass === cls) showClass(cls);
            
            // Reset fields
            document.querySelectorAll('#addMemberModal input').forEach(i => i.value = "");
        }

        function deleteStudent(id) {
            if (confirm("Hapus data anak ini?")) {
                students = students.filter(s => s.id !== id);
                localStorage.setItem('sm_students', JSON.stringify(students));
                showClass(currentClass);
                showToast("Data dihapus", "bg-gray-700");
            }
        }

        // 4. Tampilkan List Murid
        function showClass(className) {
            currentClass = className;
            document.getElementById('classContainer').classList.remove('hidden');
            document.getElementById('currentClassName').innerText = "Kelas: " + className;
            
            const listEl = document.getElementById('studentList');
            listEl.innerHTML = "";

            const filtered = students.filter(s => s.class === className);

            if (filtered.length === 0) {
                listEl.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">Belum ada murid di kelas ini.</div>`;
                return;
            }

            filtered.forEach(s => {
                listEl.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center gap-4 border border-gray-100">
                        <img src="${s.photo}" class="w-16 h-16 rounded-full bg-indigo-50 border-2 border-indigo-200">
                        <div class="flex-1 min-w-0">
                            <h5 class="font-bold text-gray-800 truncate">${s.name}</h5>
                            <p class="text-xs text-gray-500">${s.pob}, ${s.dob} • ${s.age} Thn</p>
                            <p class="text-[10px] text-indigo-600 font-bold uppercase mt-1">Hadir: ${s.attendance} Kali</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="deleteStudent(${s.id})" class="p-2 text-red-400 hover:bg-red-50 rounded-lg">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        // 5. Fitur Simulasi Scan Wajah
        async function startScan() {
            const video = document.getElementById('video');
            const modal = document.getElementById('scanModal');
            const status = document.getElementById('scanStatus');
            
            try {
                // Konfigurasi kamera agar bekerja lebih baik di mobile
                const constraints = { 
                    video: { facingMode: "user" } 
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                modal.classList.remove('hidden');
                status.innerText = "Kamera aktif. Silakan arahkan wajah ke layar.";
            } catch (err) {
                console.error(err);
                showToast("Akses kamera ditolak atau tidak didukung!", "bg-red-500");
            }
        }

        function processScan() {
            const status = document.getElementById('scanStatus');
            const btn = document.getElementById('captureBtn');
            btn.disabled = true;
            status.innerText = "Memproses wajah... (Memindai Database)";

            // Simulasi proses identifikasi (random murid dari kelas terpilih)
            setTimeout(() => {
                const classStudents = students.filter(s => s.class === currentClass);
                
                if (classStudents.length === 0) {
                    status.innerHTML = `<span class="text-red-500">Gagal: Tidak ada data di kelas ini</span>`;
                    btn.disabled = false;
                    return;
                }

                // Logika: Mencoba mencocokkan wajah. Kita buat 80% berhasil untuk simulasi.
                const isSuccess = Math.random() > 0.2;

                if (isSuccess) {
                    const found = classStudents[Math.floor(Math.random() * classStudents.length)];
                    found.attendance += 1;
                    localStorage.setItem('sm_students', JSON.stringify(students));
                    
                    status.innerHTML = `
                        <div class="text-emerald-600 font-bold">TERDETEKSI!</div>
                        <div class="text-xs">${found.name} dinyatakan HADIR.</div>
                    `;
                    
                    setTimeout(() => {
                        closeModal('scanModal');
                        showClass(currentClass);
                        showToast(`Absensi ${found.name} Berhasil!`, "bg-emerald-500");
                    }, 2000);
                } else {
                    status.innerHTML = `<span class="text-red-500 font-bold">TIDAK TERDETEKSI!</span><br><span class="text-[10px]">Wajah tidak sesuai dengan database.</span>`;
                    btn.disabled = false;
                }
            }, 1500);
        }

        // 6. PDF Generation (Full Rekap)
        function generateFullReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text("Laporan Absensi Sekolah Minggu", 105, 15, { align: "center" });
            doc.setFontSize(10);
            doc.text("GPdI Immanuel Berastagi", 105, 22, { align: "center" });
            doc.line(20, 25, 190, 25);

            const tableData = students.map((s, index) => [
                index + 1,
                s.name,
                s.class,
                s.edu,
                s.attendance + " Kali"
            ]);

            doc.autoTable({
                head: [['No', 'Nama Murid', 'Kelas SM', 'Pendidikan', 'Kehadiran']],
                body: tableData,
                startY: 30,
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229] }
            });

            doc.save("rekap_absensi_sm_immanuel.pdf");
            showToast("Laporan PDF berhasil diunduh!", "bg-indigo-600");
        }

        // Helper: Toast Notification
        function showToast(msg, bgColor) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold transition-all duration-300 z-[100] ${bgColor} opacity-100`;
            
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
