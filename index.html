<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi GPdI Immanuel (Barcode Scanner)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script>
        // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI BAWAH INI:
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyco_rt9RYYbo8IEXT1WpfHxYD9KydbICfobGAnEey51M8A_hdz2SIWfa3w7_CcUeaS2A/exec";

        let students = []; // Data sekarang dikosongkan, akan diisi dari Database Excel
        let html5QrCode;
        let currentClass = "";

        // Fungsi mengambil data dari Google Sheets
        async function loadDataFromDatabase() {
            try {
                window.showToast("Memuat data dari Database...", "bg-blue-500");
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                students = data;
                window.updateGlobalStats();
                if(currentClass) window.renderStudentList(currentClass);
                window.showToast("Data berhasil dimuat!", "bg-emerald-500");
            } catch (error) {
                console.error(error);
                window.showToast("Gagal memuat database. Periksa Koneksi Internet.", "bg-red-500");
            }
        }

        window.updateGlobalStats = () => {
            document.getElementById('statTotalMurid').innerText = students.length;
            document.getElementById('statTotalAbsensi').innerText = students.reduce((acc, curr) => acc + Number(curr.attendance || 0), 0);
            window.renderOverallSummary();
        };

        window.renderOverallSummary = () => {
            const summaryBody = document.getElementById('summaryTableBody');
            if(!summaryBody) return;
            summaryBody.innerHTML = "";
            const sortedStudents = [...students].sort((a, b) => b.attendance - a.attendance);
            
            sortedStudents.forEach((s, idx) => {
                const row = document.createElement('tr');
                row.className = "border-b border-gray-50 hover:bg-gray-50 transition-colors";
                row.innerHTML = `
                    <td class="py-4 px-4 text-[10px] font-bold text-gray-400">${idx + 1}</td>
                    <td class="py-4 px-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-[10px]">
                                ${s.name.charAt(0)}
                            </div>
                            <div>
                                <p class="text-[11px] font-bold text-gray-800">${s.name}</p>
                                <p class="text-[9px] text-gray-400">${s.id}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 text-[10px] font-bold text-indigo-600">${s.class}</td>
                    <td class="py-4 px-4 text-center">
                        <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black">${s.attendance}</span>
                    </td>
                `;
                summaryBody.appendChild(row);
            });
        };

        window.downloadFullReport = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.setTextColor(79, 70, 229);
            doc.text("LAPORAN REKAPITULASI ABSENSI", 14, 20);
            doc.setFontSize(12);
            doc.setTextColor(100);
            doc.text("GPdI Immanuel Berastagi", 14, 28);
            doc.setFontSize(10);
            doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 35);
            
            doc.setDrawColor(200);
            doc.line(14, 40, 196, 40);
            doc.text(`Total Murid Terdaftar: ${students.length}`, 14, 48);
            doc.text(`Total Akumulasi Kehadiran: ${students.reduce((acc, curr) => acc + Number(curr.attendance || 0), 0)}`, 14, 54);
            
            const tableData = students.map((s, idx) => [
                idx + 1, s.id, s.name, s.class, s.attendance + " Hari"
            ]);
            
            doc.autoTable({
                head: [['No', 'ID Murid', 'Nama Lengkap', 'Kelas', 'Total Hadir']],
                body: tableData,
                startY: 65,
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229], halign: 'center' },
                styles: { fontSize: 9, cellPadding: 3 },
                columnStyles: { 0: { halign: 'center', cellWidth: 10 }, 4: { halign: 'center' } }
            });
            
            const fileName = `Rekap_Absensi_GPdI_${new Date().toLocaleDateString('id-ID').replace(/\//g, '-')}.pdf`;
            doc.save(fileName);
        };

        window.showIDCard = (studentId) => {
            const student = students.find(s => s.id === studentId);
            if(!student) return;
            
            document.getElementById('cardModal').classList.remove('hidden');
            document.getElementById('cardName').innerText = student.name;
            document.getElementById('cardIdText').innerText = student.id;
            document.getElementById('cardClass').innerText = "KELAS " + student.class.toUpperCase();
            
            JsBarcode("#barcodeCanvas", student.id, {
                format: "CODE128", width: 2, height: 80, displayValue: false, lineColor: "#1e1b4b"
            });
        };

        window.renderStudentList = (className) => {
            currentClass = className;
            const listEl = document.getElementById('studentList');
            document.getElementById('classContainer').classList.remove('hidden');
            document.getElementById('currentClassName').innerText = "Kelas: " + className;
            listEl.innerHTML = "";
            
            const filteredStudents = students.filter(s => s.class === className);
            
            if(filteredStudents.length === 0) {
                 listEl.innerHTML = `<p class="text-xs text-gray-400 italic col-span-2 text-center py-4">Belum ada murid di kelas ini.</p>`;
                 return;
            }

            filteredStudents.forEach(s => {
                const percent = Math.min((s.attendance / 12) * 100, 100);
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-100 hover:shadow-md transition-shadow relative overflow-hidden";
                const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=4f46e5&color=fff&bold=true`;
                
                card.innerHTML = `
                    <div class="relative flex-shrink-0 cursor-pointer" onclick="window.showIDCard('${s.id}')">
                        <img src="${s.photo || fallbackUrl}" onerror="this.src='${fallbackUrl}'" class="w-14 h-14 rounded-2xl object-cover border-2 border-indigo-50 shadow-sm">
                        <div class="absolute -bottom-1 -right-1 bg-white p-1 rounded-lg shadow-sm border border-gray-100">
                             <i data-lucide="qr-code" class="w-3 h-3 text-indigo-600"></i>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h5 class="font-bold text-gray-800 text-xs truncate">${s.name}</h5>
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">${s.id} • ${s.age} THN</p>
                        <div class="w-full bg-gray-100 h-1 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                    <button onclick="window.showIDCard('${s.id}')" class="p-2 bg-indigo-50 text-indigo-600 rounded-xl">
                        <i data-lucide="credit-card" class="w-4 h-4"></i>
                    </button>
                `;
                listEl.appendChild(card);
            });
            lucide.createIcons();
        };

        // Fungsi SCANNER BARCODE - Mengirim Kehadiran ke Database
        window.startScan = () => {
            document.getElementById('scanModal').classList.remove('hidden');
            const status = document.getElementById('scanStatus');
            status.innerText = "Arahkan barcode ke kamera...";
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };

            html5QrCode.start({ facingMode: "environment" }, config, async (decodedText) => {
                // Pause scanner sebentar agar tidak menscan 2x
                if (html5QrCode.isScanning) {
                     html5QrCode.pause();
                }

                const studentIdx = students.findIndex(s => s.id === decodedText);
                
                if (studentIdx !== -1) {
                    status.innerHTML = `<span class="text-blue-500 font-bold italic tracking-tight">Menyimpan absensi ${students[studentIdx].name}...</span>`;
                    
                    try {
                        // Kirim data ke Google Sheets
                        await fetch(SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams({ id: decodedText })
                        });

                        students[studentIdx].attendance = Number(students[studentIdx].attendance) + 1;
                        status.innerHTML = `<span class="text-emerald-500 font-bold italic tracking-tight">BERHASIL: Absensi Disimpan!</span>`;
                        
                        const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
                        audio.play().catch(() => {});

                        setTimeout(() => {
                            window.closeModal('scanModal');
                            if(currentClass) window.renderStudentList(currentClass);
                            window.updateGlobalStats();
                        }, 1500);

                    } catch (error) {
                        status.innerHTML = `<span class="text-red-500">Gagal menyimpan ke database.</span>`;
                        setTimeout(() => html5QrCode.resume(), 2000); // Resume scanner jika gagal
                    }
                } else {
                    status.innerHTML = `<span class="text-red-500">Barcode Tidak Terdaftar: ${decodedText}</span>`;
                    setTimeout(() => html5QrCode.resume(), 2000);
                }
            }).catch(err => console.error(err));
        };

        window.closeModal = (id) => {
            document.getElementById(id).classList.add('hidden');
            if (id === 'scanModal' && html5QrCode) {
                try {
                    html5QrCode.stop().then(() => html5QrCode.clear()).catch(e => {});
                } catch(e) {}
            }
        };

        window.handleLogin = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === "Admin" && p === "Berastagi2024") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                lucide.createIcons();
                
                // Mulai memuat data dari Database setelah login berhasil
                if(SCRIPT_URL === "MASUKKAN_URL_APPS_SCRIPT_ANDA_DISINI") {
                    window.showToast("Peringatan: URL Database Belum Diisi di Kode!", "bg-red-500");
                } else {
                    loadDataFromDatabase();
                }
            } else {
                window.showToast("Login Gagal", "bg-red-500");
            }
        };

        window.showToast = (msg, color) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            // Reset class list
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl text-[10px] uppercase tracking-widest transition-all duration-300 ${color}`;
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .btn-grad { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        #reader { border-radius: 2rem; overflow: hidden; border: none !important; }
        #reader video { object-fit: cover !important; }
        .id-card-bg { background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div id="toast" class="opacity-0 pointer-events-none fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl text-[10px] uppercase tracking-widest"></div>

    <!-- Login -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border border-gray-100">
            <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mx-auto mb-6"><i data-lucide="shield-check" class="w-8 h-8"></i></div>
            <h1 class="text-2xl font-black mb-8 tracking-tight uppercase">Login Admin</h1>
            <div class="space-y-4">
                <input type="text" id="username" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" placeholder="Username" value="Admin">
                <input type="password" id="password" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" placeholder="Password" value="Berastagi2024">
                <button onclick="handleLogin()" class="w-full btn-grad text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-transform">Masuk</button>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 p-5 flex justify-between items-center border-b border-gray-100">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-indigo-200"><i data-lucide="qr-code" class="w-4 h-4"></i></div>
                <span class="font-extrabold text-[10px] uppercase tracking-wider text-indigo-900">Portal Absensi GPdI</span>
            </div>
            <div class="flex gap-2">
                <button onclick="loadDataFromDatabase()" class="w-8 h-8 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center hover:bg-blue-100 transition-colors" title="Muat Ulang Data dari Excel"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                <button onclick="location.reload()" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center hover:bg-red-100 transition-colors" title="Keluar"><i data-lucide="power" class="w-4 h-4"></i></button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto w-full p-6 space-y-8 pb-24">
            <!-- Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-5">
                    <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center"><i data-lucide="users" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Total Murid</p>
                        <p id="statTotalMurid" class="text-2xl font-black text-gray-800">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-5">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center"><i data-lucide="check-circle" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Absensi Akumulatif</p>
                        <p id="statTotalAbsensi" class="text-2xl font-black text-gray-800">0</p>
                    </div>
                </div>
            </div>

            <!-- Tab Filter & Scan -->
            <div class="space-y-4">
                <div class="flex justify-between items-end px-2">
                    <div>
                        <h2 class="text-lg font-black text-gray-800 uppercase italic tracking-tight">Manajemen Kelas</h2>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Pilih kelas untuk absen/edit</p>
                    </div>
                    <button onclick="startScan()" class="btn-grad text-white px-6 py-3.5 rounded-2xl font-black text-[10px] tracking-widest uppercase flex items-center gap-3 shadow-xl shadow-indigo-200 active:scale-95 transition-all">
                        <i data-lucide="scan-line" class="w-5 h-5"></i> Scan Kehadiran
                    </button>
                </div>
                
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <button onclick="renderStudentList('Bintang')" class="flex-shrink-0 px-8 py-5 bg-white rounded-[1.5rem] border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex flex-col items-center gap-2 group">
                        <i data-lucide="star" class="w-6 h-6 text-amber-500 group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-[10px] uppercase tracking-widest text-gray-600">Bintang</span>
                    </button>
                    <button onclick="renderStudentList('Cahaya')" class="flex-shrink-0 px-8 py-5 bg-white rounded-[1.5rem] border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex flex-col items-center gap-2 group">
                        <i data-lucide="sun" class="w-6 h-6 text-blue-500 group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-[10px] uppercase tracking-widest text-gray-600">Cahaya</span>
                    </button>
                    <button onclick="renderStudentList('Pra Remaja')" class="flex-shrink-0 px-8 py-5 bg-white rounded-[1.5rem] border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex flex-col items-center gap-2 group">
                        <i data-lucide="flame" class="w-6 h-6 text-purple-500 group-hover:scale-110 transition-transform"></i>
                        <span class="font-bold text-[10px] uppercase tracking-widest text-gray-600">Pra Remaja</span>
                    </button>
                </div>
            </div>

            <!-- List Container -->
            <div id="classContainer" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="flex justify-between items-center px-2">
                    <h3 id="currentClassName" class="text-xs font-black text-indigo-600 uppercase tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 bg-indigo-600 rounded-full animate-pulse"></span> Kelas: -
                    </h3>
                </div>
                <div id="studentList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <!-- Rekap Keseluruhan & Download PDF -->
            <section class="space-y-4 pt-6">
                <div class="flex justify-between items-center px-2">
                    <div>
                        <h2 class="text-lg font-black text-gray-800 uppercase italic tracking-tight">Ringkasan Kehadiran</h2>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Data akumulasi seluruh murid</p>
                    </div>
                    <button onclick="downloadFullReport()" class="flex items-center gap-2 px-5 py-3 bg-white border border-gray-200 text-gray-700 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-sm hover:bg-gray-50 active:scale-95 transition-all">
                        <i data-lucide="download-cloud" class="w-4 h-4"></i> Cetak PDF
                    </button>
                </div>

                <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr>
                                    <th class="py-4 px-4 text-[9px] font-black text-gray-400 uppercase tracking-widest">No</th>
                                    <th class="py-4 px-4 text-[9px] font-black text-gray-400 uppercase tracking-widest">Murid</th>
                                    <th class="py-4 px-4 text-[9px] font-black text-gray-400 uppercase tracking-widest">Kelas</th>
                                    <th class="py-4 px-4 text-[9px] font-black text-gray-400 uppercase tracking-widest text-center">Hadir</th>
                                </tr>
                            </thead>
                            <tbody id="summaryTableBody" class="divide-y divide-gray-50">
                                <!-- Data akan dirender otomatis -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Scan Barcode -->
    <div id="scanModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 p-6 backdrop-blur-md">
        <div class="w-full max-w-sm text-center">
            <div class="bg-white p-4 rounded-[3rem] shadow-2xl overflow-hidden relative border-[6px] border-indigo-500">
                <div id="reader" style="width: 100%;"></div>
                <!-- Overlay scan line effect -->
                <div class="absolute inset-x-0 h-1 bg-indigo-500/50 shadow-[0_0_15px_rgba(79,70,229,0.5)] animate-bounce z-10 top-1/2"></div>
            </div>
            <div id="scanStatus" class="text-white mt-10 text-[10px] font-black uppercase tracking-[0.2em] bg-indigo-600/30 py-4 px-8 rounded-full border border-white/10 backdrop-blur-md">Menunggu Scanner...</div>
            <button onclick="closeModal('scanModal')" class="mt-10 bg-white/10 hover:bg-white/20 text-white px-12 py-4 rounded-full text-[10px] font-black uppercase tracking-widest transition-colors border border-white/5">Batalkan Scan</button>
        </div>
    </div>

    <!-- Modal Kartu Digital (ID CARD) -->
    <div id="cardModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-[280px] rounded-[3rem] shadow-2xl relative overflow-hidden flex flex-col items-center p-8 border border-indigo-100">
            <div class="absolute top-0 left-0 w-full h-24 btn-grad opacity-10"></div>
            
            <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center text-white mb-6 z-10 shadow-lg shadow-indigo-200">
                <i data-lucide="cross" class="w-7 h-7"></i>
            </div>

            <h2 id="cardName" class="font-black text-lg text-indigo-950 mb-1 text-center italic">Nama Murid</h2>
            <p id="cardIdText" class="text-[9px] font-bold text-gray-400 tracking-widest mb-5">IMN-000</p>
            
            <div class="px-5 py-2 bg-indigo-50 text-indigo-600 rounded-full text-[9px] font-black uppercase tracking-widest mb-10 border border-indigo-100">
                <span id="cardClass">Kelas -</span>
            </div>

            <!-- Kontainer Barcode -->
            <div class="bg-white p-6 rounded-[2rem] border-2 border-dashed border-gray-200 mb-10 w-full flex justify-center shadow-inner">
                <svg id="barcodeCanvas"></svg>
            </div>

            <div class="flex gap-3 w-full">
                <button onclick="window.print()" class="flex-1 btn-grad text-white py-4 rounded-2xl font-black text-[9px] tracking-widest uppercase shadow-lg shadow-indigo-200 active:scale-95 transition-all">Cetak</button>
                <button onclick="closeModal('cardModal')" class="bg-gray-100 text-gray-500 px-6 rounded-2xl hover:bg-gray-200 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <p class="mt-8 text-[7px] text-gray-300 uppercase font-black tracking-[0.3em]">GPdI Immanuel Berastagi</p>
        </div>
    </div>

    <script>
        window.onload = () => {
            lucide.createIcons();
            // Data tidak di-load disini lagi, melainkan dipanggil saat tombol Login ditekan.
        }
    </script>
</body>
</html>
