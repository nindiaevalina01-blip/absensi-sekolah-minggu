        // Konfigurasi URL Foto
        function getPhotoUrl(driveId, studentName) {
            if (!driveId) return `https://api.dicebear.com/7.x/initials/png?seed=${encodeURIComponent(studentName)}`;
            // Menggunakan proxy atau direct link untuk preview (catatan: Drive sering kena CORS)
            return `https://lh3.googleusercontent.com/d/${driveId}`;
        }

        // Render List Murid
        function renderStudents() {
            const list = document.getElementById('studentList');
            const stats = document.getElementById('statTotalMurid');
            list.innerHTML = "";
            stats.innerText = students.length;

            students.forEach(s => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm border flex items-center gap-4 hover:border-indigo-300 cursor-pointer transition-colors";
                card.onclick = () => showPreview(s);
                card.innerHTML = `
                    <img src="${getPhotoUrl(s.photo, s.name)}" class="w-12 h-12 rounded-xl object-cover bg-gray-100" 
                         onerror="this.src='https://api.dicebear.com/7.x/initials/png?seed=${s.name}'">
                    <div>
                        <p class="font-black text-[11px] uppercase">${s.name}</p>
                        <p class="text-[9px] font-bold text-gray-400">${s.id} • KELAS ${s.class.toUpperCase()}</p>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // Preview Kartu Tunggal
        function showPreview(s) {
            const modal = document.getElementById('cardModal');
            document.getElementById('cardName').innerText = s.name;
            document.getElementById('cardIdDisplay').innerText = s.id;
            document.getElementById('cardPhoto').src = getPhotoUrl(s.photo, s.name);
            
            JsBarcode("#barcodePreview", s.id, {
                format: "CODE128",
                width: 2,
                height: 40,
                displayValue: false
            });
            
            modal.classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        // Fungsi Helper: Mengubah Image URL ke Base64 (Untuk PDF)
        async function getBase64Image(url) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = () => reject(null);
                    reader.readAsDataURL(blob);
                });
            } catch (err) {
                console.error("Gagal memuat gambar:", url);
                return null;
            }
        }

        // Cetak Massal PDF
        async function downloadAllCardsPDF() {
            showToast("SEDANG MENYIAPKAN DOKUMEN...", "bg-indigo-600");
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            // Layout Konfigurasi (A4: 210 x 297mm)
            const cardW = 85; 
            const cardH = 125; 
            const marginX = 15;
            const marginY = 15;
            const gap = 10;

            for (let i = 0; i < students.length; i++) {
                const s = students[i];
                const pageIndex = i % 4; // 4 kartu per halaman
                
                if (i > 0 && pageIndex === 0) doc.addPage();

                const col = pageIndex % 2;
                const row = Math.floor(pageIndex / 2);
                
                const x = marginX + (col * (cardW + gap));
                const y = marginY + (row * (cardH + gap));

                // Gambar Background Kartu (Rounded Rect)
                doc.setDrawColor(220);
                doc.setFillColor(255);
                doc.roundedRect(x, y, cardW, cardH, 8, 8, 'FD');

                // Header Biru
                doc.setFillColor(79, 70, 229);
                doc.roundedRect(x, y, cardW, 12, 8, 8, 'F');
                doc.rect(x, y + 8, cardW, 4, 'F');
                doc.setTextColor(255);
                doc.setFontSize(7);
                doc.setFont("helvetica", "bold");
                doc.text("GPdI IMMANUEL BERASTAGI", x + cardW / 2, y + 8, { align: "center" });

                // Ambil Foto (Base64)
                let photoData = await getBase64Image(getPhotoUrl(s.photo, s.name));
                // Fallback jika Drive gagal (CORS)
                if (!photoData) {
                    const fallbackUrl = `https://api.dicebear.com/7.x/initials/png?seed=${encodeURIComponent(s.name)}&backgroundType=gradientLinear`;
                    photoData = await getBase64Image(fallbackUrl);
                }

                if (photoData) {
                    try {
                        doc.addImage(photoData, 'PNG', x + (cardW / 2 - 20), y + 20, 40, 50);
                    } catch (e) {
                        console.error("Gagal input gambar ke PDF");
                    }
                }

                // Info Murid
                doc.setTextColor(30);
                doc.setFontSize(11);
                const displayName = s.name.length > 20 ? s.name.substring(0, 18) + '..' : s.name;
                doc.text(displayName.toUpperCase(), x + cardW / 2, y + 82, { align: "center" });
                
                doc.setFontSize(7);
                doc.setTextColor(150);
                doc.text(s.id + " • KELAS " + s.class.toUpperCase(), x + cardW / 2, y + 88, { align: "center" });

                // Divider Line
                doc.setDrawColor(240);
                doc.line(x + 10, y + 95, x + cardW - 10, y + 95);

                // Barcode
                const canvas = document.getElementById('hiddenBarcode');
                JsBarcode(canvas, s.id, { format: "CODE128", displayValue: false, margin: 0 });
                const barcodeData = canvas.toDataURL("image/png");
                doc.addImage(barcodeData, 'PNG', x + (cardW / 2 - 20), y + 105, 40, 10);
            }

            doc.save(`KARTU_MURID_ALL_${Date.now()}.pdf`);
            showToast("PDF BERHASIL DIUNDUH!", "bg-green-600");
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl text-[10px] uppercase tracking-widest transition-all ${color}`;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        // Inisialisasi Lucide Icons & Render Data
        window.onload = () => {
            if(typeof lucide !== 'undefined') lucide.createIcons();
            renderStudents();
        };
