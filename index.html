<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi - GPdI Immanuel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scale-in-center { animation: scale-in-center 0.3s cubic-bezier(0.250, 0.460, 0.450, 0.940) both; }
        @keyframes scale-in-center { 
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .card-glow:hover { box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.2); }
        .presence-active { border-color: #6366f1; background-color: #f5f3ff; }
        
        /* Glassmorphism effects */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-100 scale-in-center">
            <div class="bg-indigo-600 p-10 text-white text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 -mr-10 -mt-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                <div class="relative z-10">
                    <div class="bg-white/20 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-6 backdrop-blur-sm shadow-inner">
                        <i data-lucide="church" class="w-10 h-10"></i>
                    </div>
                    <h1 class="text-3xl font-extrabold tracking-tight">Portal Absensi</h1>
                    <p class="mt-2 text-indigo-100 font-medium">GPdI Immanuel Berastagi</p>
                </div>
            </div>
            
            <form id="login-form" class="p-8 space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700 ml-1">Username</label>
                    <input type="text" id="username" placeholder="SM2026" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-700 ml-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                    Masuk Sekarang <i data-lucide="log-in" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="main-dashboard" class="hidden">
        <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-20">
                    <div class="flex items-center gap-3">
                        <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-md">
                            <i data-lucide="church" class="w-6 h-6"></i>
                        </div>
                        <div class="hidden sm:block">
                            <h1 class="text-xl font-bold text-slate-900 leading-none">GPdI Immanuel</h1>
                            <p class="text-[10px] text-slate-500 font-bold mt-1 tracking-[0.1em] uppercase">Berastagi - Portal Absensi</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <button onclick="toggleModal('manual')" class="bg-white border border-slate-200 text-slate-700 px-3 py-2.5 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-slate-50 transition-all">
                            <i data-lucide="keypad" class="w-4 h-4 text-indigo-600"></i> <span class="hidden lg:inline">Kode Hadir</span>
                        </button>
                        
                        <button onclick="toggleModal('report')" class="bg-white border border-slate-200 text-slate-700 px-3 py-2.5 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-slate-50 transition-all">
                            <i data-lucide="file-spreadsheet" class="w-4 h-4 text-emerald-600"></i> <span class="hidden lg:inline">Laporan</span>
                        </button>

                        <button onclick="toggleModal('kia-massal')" class="bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg">
                            <i data-lucide="contact-2" class="w-4 h-4"></i> <span>Cetak KIA</span>
                        </button>

                        <button onclick="logout()" class="p-2.5 bg-slate-100 text-slate-500 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 pb-20">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-6 rounded-[2rem] text-white shadow-xl">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-indigo-100 text-sm font-medium">Hadir Hari Ini</p>
                            <h3 id="stat-present" class="text-5xl font-black mt-2 tracking-tighter">0</h3>
                        </div>
                        <div class="bg-white/20 p-3 rounded-2xl"><i data-lucide="user-check" class="w-7 h-7"></i></div>
                    </div>
                    <p class="mt-4 text-xs text-indigo-200 font-bold uppercase tracking-widest">Total <span id="stat-total">0</span> Murid</p>
                </div>

                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-slate-500 text-sm font-medium">Progress Kehadiran</p>
                        <span id="stat-percent" class="text-indigo-600 font-bold">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                        <div id="stat-bar" class="bg-indigo-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <p class="mt-4 text-[11px] text-slate-400 font-medium italic">Sinkronisasi data otomatis ke browser anda.</p>
                </div>

                <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex flex-col justify-center">
                    <p class="text-slate-500 text-sm font-medium">Hari Kebaktian</p>
                    <h3 id="current-date" class="text-xl font-bold mt-1 text-slate-900">-</h3>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-6 items-center justify-between mb-8">
                <div id="class-tabs" class="flex bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm overflow-x-auto no-scrollbar w-full md:w-auto">
                    <button onclick="filterClass('Semua')" class="tab-btn active px-6 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap bg-indigo-600 text-white shadow-lg">Semua</button>
                    <button onclick="filterClass('Cahaya')" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap text-slate-500">Cahaya</button>
                    <button onclick="filterClass('Bintang')" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap text-slate-500">Bintang</button>
                    <button onclick="filterClass('Pra Remaja')" class="tab-btn px-6 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap text-slate-500">Pra Remaja</button>
                </div>

                <div class="relative w-full md:w-96">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4.5 h-4.5"></i>
                    <input type="text" id="search-input" placeholder="Cari ID atau Nama Murid..." oninput="handleSearch()"
                        class="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm transition-all text-sm font-medium">
                </div>
            </div>

            <div id="student-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <!-- Modal Laporan -->
    <div id="modal-report" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl scale-in-center">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-slate-900">Cetak Laporan</h3>
                <button onclick="toggleModal('report')" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4">
                <label class="text-xs font-bold text-slate-500 uppercase">Nama Guru Sekolah Minggu</label>
                <input type="text" id="teacher-name" placeholder="Ketik nama di sini..." 
                    class="w-full px-5 py-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-sm bg-slate-50">
                <div class="grid grid-cols-1 gap-2 pt-2">
                    <button onclick="downloadPDF('Cahaya')" class="w-full text-left bg-white text-slate-700 font-bold py-4 px-5 rounded-2xl border border-slate-200 text-sm hover:bg-indigo-50 transition-colors flex justify-between">
                        Kelas Cahaya <i data-lucide="chevron-right" class="w-5 h-5 text-indigo-400"></i>
                    </button>
                    <button onclick="downloadPDF('Bintang')" class="w-full text-left bg-white text-slate-700 font-bold py-4 px-5 rounded-2xl border border-slate-200 text-sm hover:bg-indigo-50 transition-colors flex justify-between">
                        Kelas Bintang <i data-lucide="chevron-right" class="w-5 h-5 text-indigo-400"></i>
                    </button>
                    <button onclick="downloadPDF('Pra Remaja')" class="w-full text-left bg-white text-slate-700 font-bold py-4 px-5 rounded-2xl border border-slate-200 text-sm hover:bg-indigo-50 transition-colors flex justify-between">
                        Kelas Pra Remaja <i data-lucide="chevron-right" class="w-5 h-5 text-indigo-400"></i>
                    </button>
                    <button onclick="downloadPDF('Semua')" class="mt-2 w-full bg-indigo-600 text-white font-bold py-4 px-5 rounded-2xl shadow-xl text-sm flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-5 h-5"></i> Cetak Seluruh Absensi
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal KIA Massal -->
    <div id="modal-kia-massal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl scale-in-center">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-slate-900">Cetak KIA</h3>
                <button onclick="toggleModal('kia-massal')" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-3">
                <p class="text-xs text-slate-500 font-medium mb-4">Pilih kelas untuk mengunduh KIA dalam format PDF.</p>
                <button onclick="downloadBatchKIA('Cahaya')" class="w-full bg-slate-50 text-indigo-700 font-bold py-4 px-5 rounded-2xl border border-indigo-100 text-sm hover:bg-indigo-600 hover:text-white transition-all flex justify-between">
                    KIA Kelas Cahaya <i data-lucide="printer" class="w-5 h-5"></i>
                </button>
                <button onclick="downloadBatchKIA('Bintang')" class="w-full bg-slate-50 text-indigo-700 font-bold py-4 px-5 rounded-2xl border border-indigo-100 text-sm hover:bg-indigo-600 hover:text-white transition-all flex justify-between">
                    KIA Kelas Bintang <i data-lucide="printer" class="w-5 h-5"></i>
                </button>
                <button onclick="downloadBatchKIA('Pra Remaja')" class="w-full bg-slate-50 text-indigo-700 font-bold py-4 px-5 rounded-2xl border border-indigo-100 text-sm hover:bg-indigo-600 hover:text-white transition-all flex justify-between">
                    KIA Kelas Pra Remaja <i data-lucide="printer" class="w-5 h-5"></i>
                </button>
                <div class="pt-4">
                    <button onclick="downloadBatchKIA('Semua')" class="w-full bg-slate-900 text-white font-bold py-5 px-5 rounded-2xl shadow-2xl text-sm flex items-center justify-center gap-3">
                        <i data-lucide="layers" class="w-5 h-5"></i> CETAK SEMUA KIA (PDF)
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Manual Input -->
    <div id="modal-manual" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl scale-in-center">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-slate-900">Input Kode Hadir</h3>
                <button onclick="toggleModal('manual')" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <input type="text" id="manual-input" placeholder="Contoh: IMN-001" 
                class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none text-lg font-bold uppercase mb-6">
            <button onclick="submitManual()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all">Konfirmasi Hadir</button>
        </div>
    </div>

    <!-- Hidden Elements -->
    <input type="file" id="photo-upload" class="hidden" accept="image/*" onchange="handlePhotoFile(event)">
    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl text-white shadow-2xl font-bold transition-all"></div>

        let attendance = JSON.parse(localStorage.getItem('attendance_immanuel_v2')) || {};
        let studentPhotos = JSON.parse(localStorage.getItem('student_photos_immanuel')) || {};
        let currentClass = 'Semua';
        let searchQuery = '';
        let targetPhotoId = null;

        function getImgData(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => resolve(null);
                img.src = url;
            });
        }

        function getCombinedAttendance(id) {
            const student = STUDENTS.find(s => s.id === id);
            const hardcodedHistory = student && student.history ? student.history : [];
            const localHistory = attendance[id] || [];
            return [...new Set([...hardcodedHistory, ...localHistory])];
        }

        function getStudentPhoto(s) {
            if (studentPhotos[s.id]) return studentPhotos[s.id];
            if (s.photo && s.photo.trim().length > 10) return `https://lh3.googleusercontent.com/d/${s.photo.trim()}=s200`;
            return `https://placehold.co/150x150/6366f1/ffffff?text=${s.name.charAt(0)}`;
        }

        function showToast(msg, color = "bg-indigo-600") {
            const t = document.getElementById('toast');
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] px-8 py-4 rounded-2xl text-white shadow-2xl font-bold transition-all ${color}`;
            t.innerText = msg;
            t.classList.remove('hidden', 'opacity-0');
            setTimeout(() => {
                t.classList.add('opacity-0');
                setTimeout(() => t.classList.add('hidden'), 500);
            }, 3000);
        }

        function toggleModal(id) {
            const m = document.getElementById(`modal-${id}`);
            m.classList.toggle('hidden');
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            // Akses default: SM2026 / Imn2026
            if(user === 'SM2026' && pass === 'Imn2026') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.remove('hidden');
                initApp();
            } else {
                showToast("Username atau Password Salah!", "bg-rose-600");
            }
        });

        function logout() {
            if(confirm("Apakah Anda yakin ingin keluar?")) {
                location.reload();
            }
        }

        function initApp() {
            lucide.createIcons();
            const date = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = date.toLocaleDateString('id-ID', options);
            updateStats();
            renderStudents();
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const present = STUDENTS.filter(s => getCombinedAttendance(s.id).includes(today)).length;
            const total = STUDENTS.length;
            const percent = Math.round((present / total) * 100) || 0;

            document.getElementById('stat-present').innerText = present;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-percent').innerText = `${percent}%`;
            document.getElementById('stat-bar').style.width = `${percent}%`;
        }

        function filterClass(cls) {
            currentClass = cls;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg');
                btn.classList.add('text-slate-500');
                if(btn.innerText === cls) {
                    btn.classList.add('bg-indigo-600', 'text-white', 'shadow-lg');
                    btn.classList.remove('text-slate-500');
                }
            });
            renderStudents();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value;
            renderStudents();
        }

        function renderStudents() {
            const grid = document.getElementById('student-grid');
            const today = new Date().toISOString().split('T')[0];
            grid.innerHTML = '';

            const filtered = STUDENTS.filter(s => {
                const mTab = currentClass === 'Semua' || s.class === currentClass;
                const mSearch = s.name.toLowerCase().includes(searchQuery.toLowerCase()) || s.id.toLowerCase().includes(searchQuery.toLowerCase());
                return mTab && mSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <div class="bg-slate-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
                            <i data-lucide="search-x" class="w-10 h-10"></i>
                        </div>
                        <p class="text-slate-500 font-medium">Murid tidak ditemukan.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            filtered.forEach(s => {
                const allDates = getCombinedAttendance(s.id);
                const isHadir = allDates.includes(today);
                const photo = getStudentPhoto(s);

                const card = document.createElement('div');
                card.className = `group bg-white rounded-[2.5rem] p-5 border-2 transition-all duration-300 card-glow cursor-pointer scale-in-center ${isHadir ? 'presence-active' : 'border-slate-100 hover:border-indigo-200'}`;
                card.onclick = () => toggleAttendance(s.id);
                
                card.innerHTML = `
                    <div class="relative mb-6">
                        <div class="aspect-square rounded-[2rem] overflow-hidden bg-indigo-50 border-4 border-white shadow-inner group-hover:scale-[1.02] transition-transform">
                            <img src="${photo}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/200x200?text=No+Photo'">
                        </div>
                        <div onclick="event.stopPropagation(); triggerPhotoUpload('${s.id}')" class="absolute -bottom-2 -right-2 bg-indigo-600 text-white p-3 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all">
                            <i data-lucide="camera" class="w-4 h-4"></i>
                        </div>
                        ${isHadir ? `
                        <div class="absolute -top-3 -left-3 bg-emerald-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider shadow-lg">
                            Hadir
                        </div>
                        ` : ''}
                    </div>
                    
                    <div class="text-center px-2">
                        <p class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] mb-1">${s.id}</p>
                        <h4 class="font-extrabold text-slate-900 text-lg leading-tight mb-2 line-clamp-1">${s.name}</h4>
                        <div class="flex flex-wrap items-center justify-center gap-2 mb-4">
                            <span class="bg-slate-100 text-slate-600 text-[10px] px-3 py-1 rounded-full font-bold">${s.age} Thn</span>
                            <span class="bg-slate-100 text-slate-600 text-[10px] px-3 py-1 rounded-full font-bold">${s.school}</span>
                            <span class="bg-indigo-50 text-indigo-600 text-[10px] px-3 py-1 rounded-full font-black">${s.class}</span>
                        </div>
                        <div class="pt-4 border-t border-slate-50 flex items-center justify-between text-[10px] text-slate-400 font-bold uppercase">
                            <span>Hadir: ${allDates.length} Kali</span>
                            <div class="flex items-center gap-1">
                                <i data-lucide="history" class="w-3 h-3"></i> Info Detail
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function toggleAttendance(id) {
            const today = new Date().toISOString().split('T')[0];
            if (!attendance[id]) attendance[id] = [];

            if (attendance[id].includes(today)) {
                attendance[id] = attendance[id].filter(d => d !== today);
                showToast("Kehadiran dibatalkan", "bg-slate-700");
            } else {
                attendance[id].push(today);
                showToast("Berhasil mencatat kehadiran!", "bg-emerald-600");
            }
            
            localStorage.setItem('attendance_immanuel_v2', JSON.stringify(attendance));
            updateStats();
            renderStudents();
        }

        function submitManual() {
            const val = document.getElementById('manual-input').value.toUpperCase().trim();
            const student = STUDENTS.find(s => s.id === val);
            if(student) {
                toggleAttendance(student.id);
                toggleModal('manual');
                document.getElementById('manual-input').value = '';
            } else {
                showToast("ID Murid tidak ditemukan!", "bg-rose-600");
            }
        }

        function triggerPhotoUpload(id) {
            targetPhotoId = id;
            document.getElementById('photo-upload').click();
        }

        function handlePhotoFile(event) {
            const file = event.target.files[0];
            if (file && targetPhotoId) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    studentPhotos[targetPhotoId] = e.target.result;
                    localStorage.setItem('student_photos_immanuel', JSON.stringify(studentPhotos));
                    renderStudents();
                    showToast("Foto berhasil diperbarui!", "bg-indigo-600");
                };
                reader.readAsDataURL(file);
            }
        }

        async function downloadPDF(filter) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const teacher = document.getElementById('teacher-name').value || "Guru Sekolah Minggu";
            const today = new Date();
            const todayKey = today.toISOString().split('T')[0];
            const dateStr = today.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

            showToast("Menyiapkan Laporan...", "bg-indigo-500");

            // Cache filtered students to avoid re-filtering
            const filteredStudents = STUDENTS.filter(s => filter === 'Semua' || s.class === filter);

            const dataMurid = filteredStudents.map((s, i) => {
                const history = getCombinedAttendance(s.id);
                return [
                    i + 1,
                    s.id,
                    s.name,
                    s.class,
                    history.includes(todayKey) ? 'HADIR' : 'ABSEN',
                    history.length
                ];
            });

            doc.setFontSize(18);
            doc.text("LAPORAN ABSENSI SEKOLAH MINGGU", 14, 22);
            doc.setFontSize(11);
            doc.text(`GPdI Immanuel Berastagi | Tanggal: ${dateStr}`, 14, 30);
            doc.text(`Kelas: ${filter} | Guru: ${teacher}`, 14, 36);

            doc.autoTable({
                startY: 45,
                head: [['No', 'ID', 'Nama Murid', 'Kelas', 'Status Hari Ini', 'Total Hadir']],
                body: dataMurid,
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229], fontSize: 9 },
                styles: { fontSize: 8 },
                alternateRowStyles: { fillColor: [245, 247, 250] }
            });

            doc.save(`Absensi_${filter}_${todayKey}.pdf`);
            showToast("Laporan Berhasil Diunduh", "bg-emerald-600");
        }

        async function downloadBatchKIA(filter) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const filtered = STUDENTS.filter(s => filter === 'Semua' || s.class === filter);
            
            showToast(`Mengunduh ${filtered.length} Foto...`, "bg-indigo-600");

            // PRE-FETCH SEMUA GAMBAR SECARA PARALEL (Ini yang membuat sangat cepat)
            const photoPromises = filtered.map(s => getImgData(getStudentPhoto(s)));
            const images = await Promise.all(photoPromises);

            let x = 10;
            let y = 10;
            const cardWidth = 90;
            const cardHeight = 55;

            for (let i = 0; i < filtered.length; i++) {
                const s = filtered[i];
                const img = images[i];
                
                // Background & Border
                doc.setDrawColor(220);
                doc.setLineWidth(0.2);
                doc.roundedRect(x, y, cardWidth, cardHeight, 3, 3);
                
                // Header
                doc.setFillColor(79, 70, 229);
                doc.roundedRect(x, y, cardWidth, 12, 3, 3, 'F');
                doc.rect(x, y + 8, cardWidth, 4, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(10);
                doc.setFont('helvetica', 'bold');
                doc.text("KARTU IDENTITAS MURID", x + 45, y + 6, { align: 'center' });
                doc.setFontSize(6);
                doc.text("GPdI IMMANUEL BERASTAGI", x + 45, y + 10, { align: 'center' });

                // Foto Murid
                if(img) {
                    try {
                        doc.addImage(img, 'JPEG', x + 5, y + 15, 22, 28);
                    } catch(e) { console.error("Gagal memuat foto untuk PDF"); }
                }
                
                // Data Murid
                doc.setTextColor(40, 40, 40);
                doc.setFontSize(8);
                doc.text(`NAMA :`, x + 32, y + 20);
                doc.setFont('helvetica', 'bold');
                doc.text(`${s.name.substring(0, 25).toUpperCase()}`, x + 45, y + 20);
                
                doc.setFont('helvetica', 'normal');
                doc.text(`ID   : ${s.id}`, x + 32, y + 25);
                doc.text(`KELAS: ${s.class}`, x + 32, y + 30);
                doc.text(`UMUR : ${s.age} Tahun`, x + 32, y + 35);
                
                // Barcode/Simbol dummy untuk estetika
                doc.setDrawColor(240);
                doc.line(x + 32, y + 42, x + 85, y + 42);
                
                // Footer
                doc.setFontSize(5);
                doc.setTextColor(150, 150, 150);
                doc.text("Kartu ini digunakan untuk sistem absensi digital.", x + 45, y + 50, { align: 'center' });

                // Tata Letak Grid
                x += cardWidth + 10;
                if (x > 150) {
                    x = 10;
                    y += cardHeight + 5;
                }
                
                if (y > 250 && i < filtered.length - 1) {
                    doc.addPage();
                    x = 10;
                    y = 10;
                }
            }

            doc.save(`KIA_Massal_${filter}.pdf`);
            showToast("KIA Berhasil Diunduh", "bg-emerald-600");
        }

                doc.setDrawColor(200);
                doc.setLineWidth(0.5);
                doc.roundedRect(x, y, cardWidth, cardHeight, 3, 3);
                
                // Header KIA
                doc.setFillColor(79, 70, 229);
                doc.roundedRect(x, y, cardWidth, 12, 3, 3, 'F');
                doc.rect(x, y + 8, cardWidth, 4, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(10);
                doc.setFont('helvetica', 'bold');
                doc.text("KARTU IDENTITAS MURID", x + 45, y + 6, { align: 'center' });
                doc.setFontSize(6);
                doc.text("GPdI IMMANUEL BERASTAGI", x + 45, y + 10, { align: 'center' });

                // Student Photo
                const photoUrl = getStudentPhoto(s);
                const img = await getImgData(photoUrl);
                if(img) {
                    doc.drawImage(img, 'JPEG', x + 5, y + 15, 22, 28);
                }
                
                // Student Details
                doc.setTextColor(50, 50, 50);
                doc.setFontSize(8);
                doc.text(`NAMA : ${s.name.toUpperCase()}`, x + 32, y + 20);
                doc.text(`ID   : ${s.id}`, x + 32, y + 25);
                doc.text(`KELAS: ${s.class}`, x + 32, y + 30);
                doc.text(`UMUR : ${s.age} Tahun`, x + 32, y + 35);
                
                // Footer
                doc.setFontSize(6);
                doc.setTextColor(150, 150, 150);
                doc.text("Tunjukkan kartu ini saat absensi.", x + 45, y + 50, { align: 'center' });

                // Layouting: 2 columns, 5 rows per page
                x += cardWidth + 10;
                if (x > 150) {
                    x = 10;
                    y += cardHeight + 5;
                }
                
                if (y > 250 && i < filtered.length - 1) {
                    doc.addPage();
                    x = 10;
                    y = 10;
                }
            }

            doc.save(`KIA_Massal_${filter}.pdf`);
            showToast("KIA Berhasil Diunduh");
        }

        // Initialize state on first load
        window.onload = () => {
            // Jika ingin langsung masuk untuk testing, uncomment baris di bawah:
            // document.getElementById('login-screen').classList.add('hidden');
            // document.getElementById('main-dashboard').classList.remove('hidden');
            // initApp();
        };
    </script>
</body>
