<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Absensi GPdI Immanuel - Face Recognition Edition</title>
    <!-- Framework & Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- Library QR/Barcode Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
        }
        .hidden { display: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #reader {
            width: 100%;
            border: none !important;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #f1f5f9;
        }
        #reader__scan_region video {
            border-radius: 1.5rem;
            object-fit: cover;
        }
        .scan-success {
            animation: pulse-green 0.5s ease-in-out;
        }
        @keyframes pulse-green {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background-color: #dcfce7; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="loadingOverlay">
        <div class="spinner mb-4"></div>
        <p id="loadingText" class="font-black text-[10px] uppercase tracking-[0.2em]">Memproses Data...</p>
    </div>

    <!-- Notifikasi Toast -->
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold z-[100] shadow-2xl text-[10px] uppercase tracking-widest opacity-0 transition-all duration-300 pointer-events-none"></div>

    <!-- 1. HALAMAN LOGIN -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-10 border border-slate-100">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                    <i data-lucide="church" class="w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-900 uppercase">Portal Absensi</h1>
                <p class="text-slate-400 font-bold text-[10px] uppercase mt-2">GPdI Immanuel Berastagi</p>
            </div>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="username" required class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Username">
                <input type="password" id="password" required class="w-full bg-slate-50 border-none rounded-2xl px-6 py-4 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Password">
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all uppercase text-[10px] tracking-widest">Masuk</button>
            </form>
        </div>
    </div>

    <!-- 2. HALAMAN DASHBOARD -->
    <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
        <nav class="glass sticky top-0 z-40 p-5 flex justify-between items-center border-b border-slate-200">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="users" class="w-4 h-4"></i>
                </div>
                <span class="font-extrabold text-[10px] uppercase tracking-wider">Dashboard Portal</span>
            </div>
            <button onclick="logout()" class="text-rose-500 p-2 rounded-xl hover:bg-rose-50 transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </nav>

        <main class="max-w-6xl mx-auto w-full p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center">
                        <i data-lucide="user-plus" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Total Murid</p>
                        <p id="statTotal" class="text-xl font-black">0</p>
                    </div>
                </div>
                
                <button onclick="openScanModal()" class="bg-emerald-500 text-white p-6 rounded-3xl shadow-lg flex items-center gap-4 hover:brightness-110 transition-all">
                    <i data-lucide="scan-eye" class="w-6 h-6"></i>
                    <div class="text-left">
                        <p class="text-[9px] font-bold opacity-80 uppercase tracking-widest">Absensi</p>
                        <p class="text-sm font-black uppercase">Scan Wajah/QR</p>
                    </div>
                </button>

                <button onclick="openPrintModal()" class="bg-slate-900 text-white p-6 rounded-3xl shadow-lg flex items-center gap-4 hover:brightness-110 transition-all">
                    <i data-lucide="printer" class="w-6 h-6"></i>
                    <div class="text-left">
                        <p class="text-[9px] font-bold opacity-50 uppercase tracking-widest">Laporan</p>
                        <p class="text-sm font-black uppercase">Daftar Hadir</p>
                    </div>
                </button>

                <button onclick="openKIAModal()" class="bg-indigo-600 text-white p-6 rounded-3xl shadow-lg flex items-center gap-4 hover:brightness-110 transition-all">
                    <i data-lucide="credit-card" class="w-6 h-6"></i>
                    <div class="text-left">
                        <p class="text-[9px] font-bold opacity-50 uppercase tracking-widest">Cetak</p>
                        <p class="text-sm font-black uppercase">Kartu KIA</p>
                    </div>
                </button>
            </div>

            <div class="space-y-4">
                <div class="flex flex-wrap gap-2" id="classTabs">
                    <button onclick="filterClass('Semua')" class="tab-btn active bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Semua</button>
                    <button onclick="filterClass('Cahaya')" class="tab-btn bg-white border border-slate-200 text-slate-400 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Cahaya</button>
                    <button onclick="filterClass('Bintang')" class="tab-btn bg-white border border-slate-200 text-slate-400 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Bintang</button>
                    <button onclick="filterClass('Pra Remaja')" class="tab-btn bg-white border border-slate-200 text-slate-400 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase">Pra Remaja</button>
                </div>

                <div id="studentGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            </div>
        </main>
    </div>

    <!-- MODAL SCAN -->
    <div id="scanModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
            <div class="flex justify-between items-center">
                <div>
                    <h3 class="text-lg font-black uppercase">Smart Scanner</h3>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Mendukung Barcode & Deteksi Wajah</p>
                </div>
                <button onclick="closeModal('scanModal')" class="bg-slate-100 p-2 rounded-full hover:bg-rose-100 hover:text-rose-500 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="relative">
                <div id="reader" class="shadow-inner"></div>
                <!-- Overlay Deteksi Wajah -->
                <div id="faceScanOverlay" class="absolute inset-0 border-4 border-indigo-500/30 rounded-[1.5rem] pointer-events-none flex flex-col items-center justify-center">
                    <div class="w-48 h-48 border-2 border-indigo-400 border-dashed rounded-full opacity-40"></div>
                </div>
            </div>
            
            <div class="pt-2">
                <p class="text-[10px] text-slate-400 text-center font-bold uppercase mb-2">Input ID Manual</p>
                <div class="flex gap-2">
                    <input type="text" id="manualInput" class="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 font-black text-center text-sm outline-none focus:ring-2 focus:ring-emerald-500 uppercase" placeholder="CONTOH: IMN-001">
                    <button onclick="processScan(document.getElementById('manualInput').value)" class="bg-emerald-500 text-white px-6 rounded-xl font-black text-[10px] uppercase shadow-lg hover:bg-emerald-600 transition-all">Input</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL PRINT LAPORAN -->
    <div id="printModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 space-y-6">
            <h3 class="text-lg font-black uppercase text-center">Cetak Daftar Hadir</h3>
            <div class="space-y-4">
                <select id="printClassCategory" class="w-full bg-slate-50 border-none rounded-xl px-4 py-4 font-bold text-sm">
                    <option value="Semua">Semua Kelas</option>
                    <option value="Cahaya">Kelas Cahaya</option>
                    <option value="Bintang">Kelas Bintang</option>
                    <option value="Pra Remaja">Kelas Pra Remaja</option>
                </select>
                <input type="text" id="teacherName" class="w-full bg-slate-50 border-none rounded-xl px-4 py-4 font-bold text-sm" placeholder="Nama Guru">
            </div>
            <div class="flex gap-2">
                <button onclick="handleGenerateReport()" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Download PDF</button>
                <button onclick="closeModal('printModal')" class="flex-1 bg-slate-100 text-slate-400 py-4 rounded-xl font-black text-[10px] uppercase">Batal</button>
            </div>
        </div>
    </div>

    <!-- MODAL KIA -->
    <div id="kiaModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-6 backdrop-blur-md">

            <h3 class="text-lg font-black uppercase text-center">Cetak Kartu KIA</h3>
            <select id="kiaClassCategory" class="w-full bg-slate-50 border-none rounded-xl px-4 py-4 font-bold text-sm">
                <option value="Semua">Semua Murid</option>
                <option value="Cahaya">Kelas Cahaya</option>
                <option value="Bintang">Kelas Bintang</option>

            <div class="flex gap-2">

                <button onclick="closeModal('kiaModal')" class="flex-1 bg-slate-100 text-slate-400 py-4 rounded-xl font-black text-[10px] uppercase">Batal</button>
            </div>
        </div>
    </div>

            { id: "IMN-0030", name: "Aurelia Br Tarigan", age: 6, school: "TK", class: "Bintang", attendance: 0, photo: "1aDIIJesac_MsoZZqvcMpDC7aJi9MRy0A" },
            { id: "IMN-0031", name: "Joe Rapha Ginting", age: 1, school: "Belum Sekolah", class: "Bintang", attendance: 0, photo: "13uDFYHuLzQxQdZGDC3EyZ0JZUW8rprIl" },
            { id: "IMN-0032", name: "Chasia Queensa Br Ginting", age: 6, school: "Belum Sekolah", class: "Bintang", attendance: 0, photo: "19i7sj8V-qxNkyDUHIn6YshkOIGbDTANv" },
            { id: "IMN-0033", name: "Axel Kenneth Ginting", age: 3, school: "Belum Sekolah", class: "Bintang", attendance: 0, photo: "1lU5KDXuWwlbmpQI0Afn0hKV4oPZ0puVU" }
        ];

        let html5QrCode = null;
        let currentFilter = "Semua";
        let isProcessing = false;

        function handleLogin(e) {
            e.preventDefault();
            if(document.getElementById('username').value === "Admin" && document.getElementById('password').value === "Admin") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                renderDashboard();
                showToast("LOGIN BERHASIL", "bg-indigo-600");
            } else {
                showToast("USERNAME/PASS SALAH", "bg-rose-500");
            }
        }

        function logout() {
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
        }

        function renderDashboard() {
            const grid = document.getElementById('studentGrid');
            const filtered = currentFilter === "Semua" ? currentStudents : currentStudents.filter(s => s.class === currentFilter);
            document.getElementById('statTotal').innerText = currentStudents.length;
            grid.innerHTML = "";

            filtered.forEach(s => {
                const photoUrl = s.photo ? `https://lh3.googleusercontent.com/d/${s.photo}` : `https://api.dicebear.com/7.x/initials/png?seed=${s.name}`;
                grid.innerHTML += `
                    <div id="card-${s.id}" class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center transition-all duration-300">
                        <div class="relative inline-block">
                             <img src="${photoUrl}" class="w-20 h-20 rounded-2xl mx-auto mb-2 object-cover bg-slate-50 border-2 border-indigo-50">
                             <div class="absolute -top-1 -right-1 bg-indigo-600 text-white text-[8px] font-bold px-2 py-0.5 rounded-full">${s.age} Thn</div>
                        </div>
                        <h4 class="text-[10px] font-black uppercase truncate px-1 text-slate-800">${s.name}</h4>
                        <div class="flex flex-col gap-0.5 mt-1">
                             <p class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">${s.id}</p>
                             <p class="text-[8px] text-indigo-400 font-extrabold uppercase">${s.school}</p>
                        </div>
                        <div class="mt-3 flex items-center justify-center gap-2">
                            <div class="px-3 py-1 bg-slate-50 text-slate-600 rounded-lg border border-slate-100">
                                <span class="text-[9px] font-black uppercase">Hadir: ${s.attendance}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function filterClass(c) {
            currentFilter = c;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'text-white');
                b.classList.add('bg-white', 'text-slate-400');
                if(b.innerText.toLowerCase() === c.toLowerCase() || (b.innerText === "Semua" && c === "Semua")) {
                    b.classList.add('bg-indigo-600', 'text-white');
                    b.classList.remove('bg-white', 'text-slate-400');
                }
            });
            renderDashboard();
        }

        async function openScanModal() {
            document.getElementById('scanModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            
            const qrConfig = { 
                fps: 20, 
                qrbox: { width: 280, height: 180 },
                aspectRatio: 1.0 
            };
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    qrConfig, 
                    (decodedText) => {
                        if(!isProcessing) {
                            processScan(decodedText);
                        }
                    }
                );
                
                // Mulai deteksi wajah berkala saat kamera aktif
                // startFaceRecognitionLoop();
            } catch (err) {
                showToast("IZINKAN KAMERA", "bg-amber-500");
                console.error(err);
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            if (id === 'scanModal' && html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                }).catch(e => console.error(e));
            }
        }

        // Fungsi Absensi Inti
        function processScan(id) {
            if(isProcessing) return;
            
            isProcessing = true;
            const cleanId = id.trim().toUpperCase();
            const idx = currentStudents.findIndex(s => s.id === cleanId || s.name.toUpperCase() === cleanId);

            if (idx !== -1) {
                const student = currentStudents[idx];
                student.attendance += 1;
                
                showToast(`BERHASIL: ${student.name}`, "bg-emerald-500");
                
                // Voice Feedback
                const msg = new SpeechSynthesisUtterance(`Halo ${student.name}, kehadiran berhasil dicatat`);
                msg.lang = 'id-ID';
                window.speechSynthesis.speak(msg);

                renderDashboard();
                
                const card = document.getElementById(`card-${student.id}`);
                if(card) {
                    card.classList.add('scan-success', 'ring-4', 'ring-emerald-400');
                    setTimeout(() => {
                        card.classList.remove('scan-success', 'ring-4', 'ring-emerald-400');
                    }, 2000);
                }

                document.getElementById('manualInput').value = "";
                
                // Cooldown 3 detik agar tidak double scan
                setTimeout(() => {
                    isProcessing = false;
                }, 3000);

            } else {
                showToast("DATA TIDAK DIKENALI", "bg-rose-500");
                setTimeout(() => { isProcessing = false; }, 2000);
            }
        }

        async function getBase64ImageFromUrl(imageUrl) {
            try {
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (e) { return null; }
        }

        async function handleGenerateKIA() {
            const filter = document.getElementById('kiaClassCategory').value;
            const filtered = filter === "Semua" ? currentStudents : currentStudents.filter(s => s.class === filter);
            
            document.getElementById('loadingText').innerText = "MENYIAPKAN KARTU...";
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const cardW = 85, cardH = 55;
            const marginX = 10, marginY = 15, gap = 5;

            for(let i=0; i<filtered.length; i++) {
                const s = filtered[i];
                if(i > 0 && i % 8 === 0) doc.addPage();
                const col = i % 2, row = Math.floor((i % 8) / 2);
                const x = marginX + (col * (cardW + gap)), y = marginY + (row * (cardH + gap));

                // Desain Kartu (Update agar siap cetak)
                doc.setDrawColor(200); doc.setFillColor(255);
                doc.roundedRect(x, y, cardW, cardH, 4, 4, 'FD');
                
                doc.setFillColor(79, 70, 229);
                doc.roundedRect(x, y, cardW, 10, 4, 4, 'F');
                doc.rect(x, y+6, cardW, 4, 'F'); 
                
                doc.setTextColor(255); doc.setFontSize(8); doc.setFont("helvetica", "bold");
                doc.text("KARTU IDENTITAS ANAK - GPdI", x + cardW/2, y + 6.5, { align: "center" });

                const photoUrl = s.photo ? `https://lh3.googleusercontent.com/d/${s.photo}` : null;
                doc.setDrawColor(240); doc.setFillColor(245);
                doc.roundedRect(x + 5, y + 14, 20, 25, 2, 2, 'FD');
                
                if(photoUrl) {
                    const img = await getBase64ImageFromUrl(photoUrl);
                    if(img) doc.addImage(img, 'JPEG', x + 6, y + 15, 18, 23);
                }

                doc.setTextColor(40); doc.setFontSize(9); doc.setFont("helvetica", "bold");
                doc.text(s.name.toUpperCase(), x + 28, y + 18);
                
                doc.setFontSize(7); doc.setTextColor(100); doc.setFont("helvetica", "normal");
                doc.text(`ID ABSENSI`, x + 28, y + 23);
                doc.setTextColor(60); doc.text(`: ${s.id}`, x + 45, y + 23);
                
                doc.setTextColor(100); doc.text(`USIA`, x + 28, y + 27);
                doc.setTextColor(60); doc.text(`: ${s.age} Tahun`, x + 45, y + 27);
                
                doc.setTextColor(100); doc.text(`PENDIDIKAN`, x + 28, y + 31);
                doc.setTextColor(60); doc.text(`: ${s.school}`, x + 45, y + 31);
                
                doc.setTextColor(100); doc.text(`KELAS SM`, x + 28, y + 35);
                doc.setTextColor(60); doc.text(`: ${s.class}`, x + 45, y + 35);

                const canvas = document.getElementById('hiddenBarcode');
                JsBarcode(canvas, s.id, { 
                    format: "CODE128", 
                    displayValue: false, 
                    margin: 0,
                    lineColor: "#1e293b"
                });
                doc.addImage(canvas.toDataURL(), 'PNG', x + cardW - 35, y + cardH - 12, 30, 8);
                doc.setFontSize(6); doc.text(s.id, x + cardW - 20, y + cardH - 3.5, { align: "center" });
            }
            doc.save(`KIA_GPdI_READY_${Date.now()}.pdf`);
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function handleGenerateReport() {
            const filter = document.getElementById('printClassCategory').value;
            const teacher = document.getElementById('teacherName').value || "..................";
            const filtered = filter === "Semua" ? currentStudents : currentStudents.filter(s => s.class === filter);
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(16); doc.text(`DAFTAR HADIR SEKOLAH MINGGU`, 105, 15, { align: "center" });
            doc.setFontSize(10); doc.text(`Kategori: ${filter} | Guru: ${teacher} | Tanggal: ${new Date().toLocaleDateString('id-ID')}`, 105, 22, { align: "center" });
            
            const body = filtered.map(s => [s.id, s.name, s.age, s.school, s.class, s.attendance]);
            doc.autoTable({ 
                startY: 30, 
                head: [['ID', 'NAMA MURID', 'USIA', 'SEKOLAH', 'KELAS', 'HADIR']], 
                body: body,
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229] }
            });
            doc.save(`LAPORAN_HADIR_${filter}.pdf`);
        }

        function openPrintModal() { document.getElementById('printModal').classList.remove('hidden'); }
        function openKIAModal() { document.getElementById('kiaModal').classList.remove('hidden'); }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed top-5 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold z-[100] shadow-2xl text-[10px] uppercase tracking-widest transition-all ${color}`;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        window.onload = () => lucide.createIcons();
    </script>
