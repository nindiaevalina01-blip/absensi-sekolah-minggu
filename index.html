<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi GPdI Immanuel (Barcode Scanner)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <!-- Library untuk Barcode & QR Scanner -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTJI5N49B1H9XmvXqse2ew7Fg9oMglVL2gY79pLgnNegb0xv4tLlgdHU-APG42DYODQQ/exec";

        let students = [
            { id: "IMN-001", name: "Eldo Desenta Purba", pob: "Berastagi", dob: "2015-01-01", age: "9", edu: "SD Kelas 3", class: "Cahaya", attendance: 5, photo: "https://drive.google.com/uc?export=view&id=1_8p2xL9RkXoYn8Z4q2wE-X_v0jB_vL-P" },
            { id: "IMN-002", name: "Adriel Sembiring", pob: "Berastagi", dob: "2020-05-12", age: "4", edu: "Belum Sekolah", class: "Bintang", attendance: 3, photo: "https://images.unsplash.com/photo-1502033059179-106202452932?w=400&h=400&fit=crop" },
            { id: "IMN-003", name: "Gracia Tarigan", pob: "Kabanjahe", dob: "2015-08-20", age: "9", edu: "SD Kelas 1-3", class: "Cahaya", attendance: 7, photo: "https://images.unsplash.com/photo-1544126592-807daa215a75?w=400&h=400&fit=crop" },
            { id: "IMN-004", name: "Samuel Ginting", pob: "Berastagi", dob: "2010-02-15", age: "14", edu: "SMP", class: "Pra Remaja", attendance: 10, photo: "https://images.unsplash.com/photo-1520341280432-4749d4d7bcf9?w=400&h=400&fit=crop" }
        ];
        
        let html5QrCode;
        let currentClass = "";
        window.selectedBase64Image = "";

        window.updateGlobalStats = () => {
            document.getElementById('statTotalMurid').innerText = students.length;
            document.getElementById('statTotalAbsensi').innerText = students.reduce((acc, curr) => acc + curr.attendance, 0);
        };

        // Fungsi menampilkan Kartu Barcode Murid
        window.showIDCard = (studentId) => {
            const student = students.find(s => s.id === studentId);
            if(!student) return;
            
            document.getElementById('cardModal').classList.remove('hidden');
            document.getElementById('cardName').innerText = student.name;
            document.getElementById('cardIdText').innerText = student.id;
            document.getElementById('cardClass').innerText = "KELAS " + student.class.toUpperCase();
            
            // Generate Barcode menggunakan JsBarcode
            JsBarcode("#barcodeCanvas", student.id, {
                format: "CODE128",
                width: 2,
                height: 80,
                displayValue: false,
                lineColor: "#1e1b4b"
            });
        };

        window.renderStudentList = (className) => {
            currentClass = className;
            const listEl = document.getElementById('studentList');
            document.getElementById('classContainer').classList.remove('hidden');
            document.getElementById('currentClassName').innerText = "Kelas: " + className;
            listEl.innerHTML = "";
            
            students.filter(s => s.class === className).forEach(s => {
                const percent = Math.min((s.attendance / 12) * 100, 100);
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-100 hover:shadow-md transition-shadow relative overflow-hidden";
                
                const fallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=4f46e5&color=fff&bold=true`;
                
                card.innerHTML = `
                    <div class="relative flex-shrink-0 cursor-pointer" onclick="window.showIDCard('${s.id}')">
                        <img src="${s.photo || fallbackUrl}" onerror="this.src='${fallbackUrl}'" class="w-14 h-14 rounded-2xl object-cover border-2 border-indigo-50 shadow-sm">
                        <div class="absolute -bottom-1 -right-1 bg-white p-1 rounded-lg shadow-sm border border-gray-100">
                             <i data-lucide="qr-code" class="w-3 h-3 text-indigo-600"></i>
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h5 class="font-bold text-gray-800 text-xs truncate">${s.name}</h5>
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">${s.id} • ${s.age} THN</p>
                        <div class="w-full bg-gray-100 h-1 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                    <button onclick="window.showIDCard('${s.id}')" class="p-2 bg-indigo-50 text-indigo-600 rounded-xl">
                        <i data-lucide="credit-card" class="w-4 h-4"></i>
                    </button>
                `;
                listEl.appendChild(card);
            });
            lucide.createIcons();
        };

        // Fungsi SCANNER BARCODE ASLI
        window.startScan = () => {
            document.getElementById('scanModal').classList.remove('hidden');
            const status = document.getElementById('scanStatus');
            status.innerText = "Arahkan barcode ke kamera...";
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // Berhasil Scan
                const studentIdx = students.findIndex(s => s.id === decodedText);
                if (studentIdx !== -1) {
                    students[studentIdx].attendance += 1;
                    status.innerHTML = `<span class="text-emerald-500 font-bold">BERHASIL: ${students[studentIdx].name}</span>`;
                    
                    // Bunyi beep sederhana (opsional)
                    const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
                    audio.play();

                    setTimeout(() => {
                        window.closeModal('scanModal');
                        window.renderStudentList(currentClass);
                        window.updateGlobalStats();
                    }, 1000);
                } else {
                    status.innerHTML = `<span class="text-red-500">Barcode Tidak Terdaftar: ${decodedText}</span>`;
                }
            }).catch(err => console.error(err));
        };

        window.closeModal = (id) => {
            document.getElementById(id).classList.add('hidden');
            if (id === 'scanModal' && html5QrCode) {
                html5QrCode.stop().then(() => html5QrCode.clear());
            }
        };

        window.handleLogin = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === "Admin" && p === "Berastagi2024") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                window.updateGlobalStats();
                lucide.createIcons();
            } else {
                window.showToast("Login Gagal", "bg-red-500");
            }
        };

        window.showToast = (msg, color) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl ${color} opacity-100 transition-all`;
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .btn-grad { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        #reader { border-radius: 2rem; overflow: hidden; border: none !important; }
        #reader video { object-fit: cover !important; }
        .id-card-bg { background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div id="toast" class="opacity-0 pointer-events-none fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl text-xs uppercase tracking-widest"></div>

    <!-- Login -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border border-gray-100">
            <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mx-auto mb-6"><i data-lucide="shield-check" class="w-8 h-8"></i></div>
            <h1 class="text-2xl font-black mb-8 tracking-tight uppercase">Login Admin</h1>
            <div class="space-y-4">
                <input type="text" id="username" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" placeholder="Username" value="Admin">
                <input type="password" id="password" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" placeholder="Password" value="Berastagi2024">
                <button onclick="handleLogin()" class="w-full btn-grad text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-transform">Masuk</button>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 p-5 flex justify-between items-center border-b border-gray-100">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><i data-lucide="qr-code" class="w-4 h-4"></i></div>
                <span class="font-extrabold text-xs uppercase tracking-wider text-indigo-900">Portal Absensi GPdI</span>
            </div>
            <button onclick="location.reload()" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center"><i data-lucide="power" class="w-4 h-4"></i></button>
        </nav>

        <main class="max-w-4xl mx-auto w-full p-6 space-y-6 pb-24">
            <!-- Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center"><i data-lucide="users" class="w-5 h-5"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Total Murid</p>
                        <p id="statTotalMurid" class="text-xl font-black">0</p>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center"><i data-lucide="check-circle" class="w-5 h-5"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Total Absensi</p>
                        <p id="statTotalAbsensi" class="text-xl font-black">0</p>
                    </div>
                </div>
            </div>

            <!-- Tab Filter -->
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="renderStudentList('Bintang')" class="flex-shrink-0 px-6 py-4 bg-white rounded-2xl border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex items-center gap-3">
                    <i data-lucide="star" class="w-4 h-4 text-amber-500"></i>
                    <span class="font-bold text-xs uppercase tracking-tighter">Bintang</span>
                </button>
                <button onclick="renderStudentList('Cahaya')" class="flex-shrink-0 px-6 py-4 bg-white rounded-2xl border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex items-center gap-3">
                    <i data-lucide="sun" class="w-4 h-4 text-blue-500"></i>
                    <span class="font-bold text-xs uppercase tracking-tighter">Cahaya</span>
                </button>
                <button onclick="renderStudentList('Pra Remaja')" class="flex-shrink-0 px-6 py-4 bg-white rounded-2xl border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex items-center gap-3">
                    <i data-lucide="flame" class="w-4 h-4 text-purple-500"></i>
                    <span class="font-bold text-xs uppercase tracking-tighter">Pra Remaja</span>
                </button>
            </div>

            <!-- List Container -->
            <div id="classContainer" class="hidden space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 id="currentClassName" class="text-sm font-black text-indigo-900 uppercase italic">Kelas: -</h3>
                    <button onclick="startScan()" class="btn-grad text-white px-5 py-3 rounded-2xl font-black text-[10px] tracking-widest uppercase flex items-center gap-2 shadow-lg active:scale-95 transition-transform">
                        <i data-lucide="scan-line" class="w-4 h-4"></i> Scan Kehadiran
                    </button>
                </div>
                <div id="studentList" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </main>
    </div>

    <!-- Modal Scan Barcode -->
    <div id="scanModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 p-6 backdrop-blur-md">
        <div class="w-full max-w-sm text-center">
            <div class="bg-white p-4 rounded-[2.5rem] shadow-2xl overflow-hidden relative border-4 border-indigo-500">
                <div id="reader" style="width: 100%;"></div>
            </div>
            <div id="scanStatus" class="text-white mt-8 text-xs font-bold uppercase tracking-widest bg-indigo-600/50 py-3 rounded-full">Menunggu Kamera...</div>
            <button onclick="closeModal('scanModal')" class="mt-8 bg-white/10 hover:bg-white/20 text-white px-10 py-4 rounded-3xl text-xs font-black uppercase tracking-widest">Tutup</button>
        </div>
    </div>

    <!-- Modal Kartu Digital (ID CARD) -->
    <div id="cardModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] shadow-2xl relative overflow-hidden flex flex-col items-center p-8 border border-indigo-100">
            <div class="absolute top-0 left-0 w-full h-24 btn-grad opacity-10"></div>
            
            <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white mb-6 z-10">
                <i data-lucide="cross" class="w-6 h-6"></i>
            </div>

            <h2 id="cardName" class="font-black text-lg text-indigo-950 mb-1 text-center">Nama Murid</h2>
            <p id="cardIdText" class="text-[10px] font-bold text-gray-400 tracking-widest mb-4">IMN-000</p>
            
            <div class="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-[9px] font-black uppercase tracking-widest mb-8">
                <span id="cardClass">Kelas -</span>
            </div>

            <!-- Kontainer Barcode -->
            <div class="bg-white p-6 rounded-2xl border-2 border-dashed border-gray-200 mb-8 w-full flex justify-center">
                <svg id="barcodeCanvas"></svg>
            </div>

            <div class="flex gap-3 w-full">
                <button onclick="window.print()" class="flex-1 btn-grad text-white py-4 rounded-2xl font-black text-[10px] tracking-widest uppercase shadow-lg">Cetak Kartu</button>
                <button onclick="closeModal('cardModal')" class="bg-gray-100 text-gray-500 px-5 rounded-2xl"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <p class="mt-6 text-[8px] text-gray-300 uppercase font-bold tracking-widest">GPdI Immanuel Berastagi</p>
        </div>
    </div>

    <script>
        window.onload = () => {
            lucide.createIcons();
            window.updateGlobalStats();
        }
    </script>
</body>
</html>
