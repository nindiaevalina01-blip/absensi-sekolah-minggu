<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi GPdI Immanuel (Photo Fixed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fa; }
        .btn-grad { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        #reader { border-radius: 2rem; overflow: hidden; border: none !important; }
        
        @media print {
            body * { visibility: hidden; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="antialiased text-gray-800">

    <!-- Notifikasi -->
    <div id="toast" class="opacity-0 pointer-events-none fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl text-[10px] uppercase tracking-widest transition-all duration-300"></div>

    <!-- Halaman Login -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <h1 class="text-2xl font-black mb-8 tracking-tight uppercase">Admin Login</h1>
            <div class="space-y-4">
                <input type="text" id="username" class="w-full px-6 py-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Username" value="Admin">
                <input type="password" id="password" class="w-full px-6 py-4 rounded-2xl bg-gray-50 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Password" value="Berastagi2024">
                <button onclick="handleLogin()" class="w-full btn-grad text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Masuk</button>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 p-5 flex justify-between items-center border-b">
            <span class="font-extrabold text-[10px] uppercase tracking-wider text-indigo-900">Portal Absensi GPdI</span>
            <button onclick="location.reload()" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center"><i data-lucide="power" class="w-4 h-4"></i></button>
        </nav>

        <main class="max-w-4xl mx-auto w-full p-6 space-y-8">
            <!-- Statistik -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
                    <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center"><i data-lucide="users" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase">Total Murid</p>
                        <p id="statTotalMurid" class="text-2xl font-black">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm flex items-center gap-5">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center"><i data-lucide="check-circle" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase">Total Hadir</p>
                        <p id="statTotalAbsensi" class="text-2xl font-black">0</p>
                    </div>
                </div>
            </div>

            <!-- Tombol Scan -->
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-black uppercase italic">Kategori Kelas</h2>
                <button onclick="startScan()" class="btn-grad text-white px-6 py-3.5 rounded-2xl font-black text-[10px] uppercase flex items-center gap-3">
                    <i data-lucide="scan-line" class="w-5 h-5"></i> Scan Barcode
                </button>
            </div>

            <!-- List Kategori -->
            <div class="flex gap-2 overflow-x-auto pb-4">
                <button onclick="renderStudentList('Bintang')" class="px-8 py-5 bg-white rounded-[1.5rem] shadow-sm font-bold text-[10px] uppercase">Bintang</button>
                <button onclick="renderStudentList('Cahaya')" class="px-8 py-5 bg-white rounded-[1.5rem] shadow-sm font-bold text-[10px] uppercase">Cahaya</button>
                <button onclick="renderStudentList('Pra Remaja')" class="px-8 py-5 bg-white rounded-[1.5rem] shadow-sm font-bold text-[10px] uppercase">Pra Remaja</button>
            </div>

            <div id="classContainer" class="hidden space-y-4">
                <h3 id="currentClassName" class="text-xs font-black text-indigo-600 uppercase px-2">Kategori: -</h3>
                <div id="studentList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </main>
    </div>

    <!-- Modal ID Card -->
    <div id="cardModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-6 backdrop-blur-sm">
        <div id="printArea" class="bg-white w-full max-w-[400px] rounded-[2.5rem] shadow-2xl overflow-hidden border">
            <div class="bg-indigo-600 p-6 text-white flex justify-between items-center">
                <span class="text-[9px] font-black uppercase">GPdI Immanuel Berastagi</span>
                <span id="cardIdText" class="text-[9px] font-bold opacity-80">IMN-000</span>
            </div>

            <div class="p-8">
                <div class="flex gap-6 items-start">
                    <img id="cardPhoto" src="" class="w-24 h-24 rounded-2xl bg-indigo-50 border-2 border-indigo-100 object-cover">
                    <div class="flex-1 space-y-3">
                        <div>
                            <p class="text-[8px] font-bold text-gray-400 uppercase">Nama Lengkap</p>
                            <h2 id="cardName" class="font-black text-lg text-indigo-950">Nama Murid</h2>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <p class="text-[8px] font-bold text-gray-400 uppercase">Usia</p>
                                <p id="cardAge" class="text-xs font-bold text-gray-700">- Thn</p>
                            </div>
                            <div>
                                <p class="text-[8px] font-bold text-gray-400 uppercase">Hadir</p>
                                <p id="cardAttendance" class="text-xs font-bold text-indigo-600">0</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-8 flex justify-center border-t border-dashed pt-6">
                    <svg id="barcodeCanvas"></svg>
                </div>
            </div>

            <div class="p-6 bg-gray-50 flex gap-3 no-print">
                <button onclick="window.print()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold text-[10px] uppercase">Cetak</button>
                <button onclick="closeModal('cardModal')" class="flex-1 bg-white border text-gray-500 py-3 rounded-xl font-bold text-[10px] uppercase">Tutup</button>
            </div>
        </div>
    </div>

    <!-- Modal Scan -->
    <div id="scanModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-6">
        <div class="w-full max-w-xs text-center">
            <div id="reader" class="bg-white"></div>
            <button onclick="closeModal('scanModal')" class="mt-8 text-white/50 text-[10px] font-bold uppercase underline">Batal</button>
        </div>
    </div>

    <script>
        // GANTI INI DENGAN URL GOOGLE APPS SCRIPT ANDA
        const SCRIPT_URL = "ISI_DENGAN_URL_DEPLOYMENT_ANDA";

        let students = [
            { 
                id: "IMN-001", 
                name: "Nindia", 
                age: 7, 
                school: "2 SD", 
                class: "Cahaya", 
                attendance: 12, 
                // CONTOH LINK GOOGLE DRIVE
                photo: "https://drive.google.com/file/d/1pe_PkQygl-d0wfoODaE_gqnWF4Hq8uBC/view?usp=sharing" 
            },
            { id: "IMN-002", name: "Budi", age: 10, school: "5 SD", class: "Cahaya", attendance: 8, photo: "" }
        ];

        let html5QrCode;
        let currentKategori = "";

        // FUNGSI KRUSIAL: Mengubah link drive biasa menjadi link gambar langsung
        function getDirectDriveLink(url, studentName) {
            if (!url || url.trim() === "") {
                return `https://api.dicebear.com/7.x/avataaars/svg?seed=${studentName}`;
            }

            if (url.includes('drive.google.com')) {
                let fileId = "";
                try {
                    if (url.includes('id=')) {
                        fileId = url.split('id=')[1].split('&')[0];
                    } else {
                        fileId = url.split('/d/')[1].split('/')[0];
                    }
                    // Format link thumbnail Google Drive yang mendukung CORS
                    return `https://lh3.googleusercontent.com/u/0/d/${fileId}`;
                } catch (e) {
                    return `https://api.dicebear.com/7.x/avataaars/svg?seed=${studentName}`;
                }
            }
            return url;
        }

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === "Admin" && p === "Berastagi2024") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                lucide.createIcons();
                updateUI();
            } else {
                showToast("Login Gagal!", "bg-red-500");
            }
        }

        function updateUI() {
            document.getElementById('statTotalMurid').innerText = students.length;
            document.getElementById('statTotalAbsensi').innerText = students.reduce((a, b) => a + Number(b.attendance || 0), 0);
            if(currentKategori) renderStudentList(currentKategori);
        }

        function renderStudentList(kategoriName) {
            currentKategori = kategoriName;
            const list = document.getElementById('studentList');
            document.getElementById('classContainer').classList.remove('hidden');
            document.getElementById('currentClassName').innerText = "Kategori: " + kategoriName;
            list.innerHTML = "";
            
            const filtered = students.filter(s => s.class === kategoriName);
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border cursor-pointer";
                card.onclick = () => showIDCard(s.id);
                card.innerHTML = `
                    <img src="${getDirectDriveLink(s.photo, s.name)}" class="w-12 h-12 rounded-xl bg-indigo-50 object-cover" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=${s.name}'">
                    <div class="flex-1">
                        <h5 class="font-bold text-gray-800 text-xs">${s.name}</h5>
                        <p class="text-[9px] text-gray-400 font-bold">${s.school} • ${s.age} Thn</p>
                    </div>
                    <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg">${s.attendance}</span>
                `;
                list.appendChild(card);
            });
        }

        function showIDCard(id) {
            const s = students.find(x => x.id === id);
            if(!s) return;
            
            document.getElementById('cardModal').classList.remove('hidden');
            document.getElementById('cardName').innerText = s.name;
            document.getElementById('cardIdText').innerText = s.id;
            document.getElementById('cardAge').innerText = (s.age || '-') + " Tahun";
            document.getElementById('cardAttendance').innerText = s.attendance + " Kali";
            document.getElementById('cardPhoto').src = getDirectDriveLink(s.photo, s.name);
            
            JsBarcode("#barcodeCanvas", s.id, { format: "CODE128", width: 2, height: 40, displayValue: false });
            lucide.createIcons();
        }

        async function processAttendance(id) {
            const index = students.findIndex(s => s.id === id);
            if (index === -1) {
                showToast("ID TIDAK DIKENAL", "bg-red-500");
                return;
            }

            // Tambah kehadiran di memori lokal agar langsung terlihat
            students[index].attendance = Number(students[index].attendance || 0) + 1;
            updateUI();
            
            showToast(`Absensi Berhasil: ${students[index].name}`, "bg-emerald-500");
            showIDCard(id);

            // Kirim ke Google Sheets (Database)
            if (SCRIPT_URL && !SCRIPT_URL.includes("ISI_DENGAN_URL")) {
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams({ id: id })
                    });
                } catch (e) {
                    console.error("Gagal sinkron database");
                }
            }
        }

        function startScan() {
            document.getElementById('scanModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
                async (decodedText) => {
                    await html5QrCode.stop();
                    closeModal('scanModal');
                    processAttendance(decodedText);
                }
            ).catch(() => showToast("Kamera error", "bg-red-500"));
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            if (id === 'scanModal' && html5QrCode) html5QrCode.stop().catch(() => {});
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl text-[10px] uppercase tracking-widest transition-all ${color}`;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
