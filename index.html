<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi GPdI Immanuel (Barcode Scanner)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .btn-grad { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        #reader { border-radius: 2rem; overflow: hidden; border: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased text-gray-800">

    <!-- Toast Notification -->
    <div id="toast" class="opacity-0 pointer-events-none fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl text-[10px] uppercase tracking-widest transition-all duration-300"></div>

    <!-- Login Page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border border-gray-100">
            <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mx-auto mb-6"><i data-lucide="shield-check" class="w-8 h-8"></i></div>
            <h1 class="text-2xl font-black mb-8 tracking-tight uppercase">Login Admin</h1>
            <div class="space-y-4">
                <input type="text" id="username" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" placeholder="Username" value="Admin">
                <input type="password" id="password" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" placeholder="Password" value="Berastagi2024">
                <button onclick="handleLogin()" class="w-full btn-grad text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-transform">Masuk</button>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 p-5 flex justify-between items-center border-b border-gray-100">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-indigo-200"><i data-lucide="qr-code" class="w-4 h-4"></i></div>
                <span class="font-extrabold text-[10px] uppercase tracking-wider text-indigo-900">Portal Absensi GPdI</span>
            </div>
            <div class="flex gap-2">
                <button onclick="loadDataFromDatabase()" class="w-8 h-8 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center" title="Refresh Data"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                <button onclick="location.reload()" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center" title="Keluar"><i data-lucide="power" class="w-4 h-4"></i></button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto w-full p-6 space-y-8 pb-24">
            <!-- Stats -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-5">
                    <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center"><i data-lucide="users" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Total Murid</p>
                        <p id="statTotalMurid" class="text-2xl font-black text-gray-800">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-5">
                    <div class="w-12 h-12 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center"><i data-lucide="check-circle" class="w-6 h-6"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Hadir Hari Ini</p>
                        <p id="statTotalAbsensi" class="text-2xl font-black text-gray-800">0</p>
                    </div>
                </div>
            </div>

            <!-- Action Area -->
            <div class="flex justify-between items-center px-2">
                <h2 class="text-lg font-black text-gray-800 uppercase italic">Kelas Sekolah Minggu</h2>
                <button onclick="startScan()" class="btn-grad text-white px-6 py-3.5 rounded-2xl font-black text-[10px] tracking-widest uppercase flex items-center gap-3 shadow-xl shadow-indigo-200">
                    <i data-lucide="scan-line" class="w-5 h-5"></i> Scan Barcode
                </button>
            </div>

            <div class="flex gap-2 overflow-x-auto pb-4 scrollbar-hide">
                <button onclick="renderStudentList('Bintang')" class="flex-shrink-0 px-8 py-5 bg-white rounded-[1.5rem] border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex flex-col items-center gap-2 group">
                    <i data-lucide="star" class="w-6 h-6 text-amber-500 group-hover:scale-110 transition-transform"></i>
                    <span class="font-bold text-[10px] uppercase tracking-widest text-gray-600">Bintang</span>
                </button>
                <button onclick="renderStudentList('Cahaya')" class="flex-shrink-0 px-8 py-5 bg-white rounded-[1.5rem] border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex flex-col items-center gap-2 group">
                    <i data-lucide="sun" class="w-6 h-6 text-blue-500 group-hover:scale-110 transition-transform"></i>
                    <span class="font-bold text-[10px] uppercase tracking-widest text-gray-600">Cahaya</span>
                </button>
                <button onclick="renderStudentList('Pra Remaja')" class="flex-shrink-0 px-8 py-5 bg-white rounded-[1.5rem] border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex flex-col items-center gap-2 group">
                    <i data-lucide="flame" class="w-6 h-6 text-purple-500 group-hover:scale-110 transition-transform"></i>
                    <span class="font-bold text-[10px] uppercase tracking-widest text-gray-600">Pra Remaja</span>
                </button>
            </div>

            <div id="classContainer" class="hidden space-y-4">
                <h3 id="currentClassName" class="text-xs font-black text-indigo-600 uppercase tracking-widest px-2">Kelas: -</h3>
                <div id="studentList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <!-- Summary Table -->
            <section class="space-y-4 pt-6">
                <div class="flex justify-between items-center px-2">
                    <h2 class="text-lg font-black text-gray-800 uppercase italic">Ringkasan Kehadiran</h2>
                    <button onclick="downloadFullReport()" class="text-gray-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> PDF
                    </button>
                </div>
                <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr>
                                <th class="py-4 px-4 text-[9px] font-black text-gray-400 uppercase tracking-widest">Murid</th>
                                <th class="py-4 px-4 text-[9px] font-black text-gray-400 uppercase tracking-widest">Kelas</th>
                                <th class="py-4 px-4 text-[9px] font-black text-gray-400 uppercase tracking-widest text-center">Hadir</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody" class="divide-y divide-gray-50 text-[11px]"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Scan -->
    <div id="scanModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-6 backdrop-blur-md">
        <div class="w-full max-w-sm text-center">
            <div id="reader" class="bg-white rounded-[2rem]"></div>
            <div id="scanStatus" class="text-white mt-8 text-[10px] font-black uppercase tracking-widest">Arahkan Barcode</div>
            <button onclick="closeModal('scanModal')" class="mt-8 text-white/50 text-[10px] font-bold uppercase tracking-widest underline">Batal</button>
        </div>
    </div>

    <!-- Modal ID Card -->
    <div id="cardModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-[280px] rounded-[3rem] shadow-2xl flex flex-col items-center p-8 text-center border border-indigo-100">
            <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white mb-6">
                <i data-lucide="church" class="w-6 h-6"></i>
            </div>
            <h2 id="cardName" class="font-black text-lg text-indigo-950 mb-1 italic">Nama Murid</h2>
            <p id="cardIdText" class="text-[10px] font-bold text-gray-400 tracking-widest mb-4">IMN-000</p>
            <div id="cardClass" class="px-4 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-[9px] font-black uppercase mb-8">KELAS -</div>
            <div class="bg-white p-4 rounded-2xl border-2 border-dashed border-gray-100 mb-8 w-full flex justify-center">
                <svg id="barcodeCanvas"></svg>
            </div>
            <button onclick="closeModal('cardModal')" class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Tutup</button>
        </div>
    </div>

    <script>
        // GANTI URL DI BAWAH INI DENGAN URL DARI GOOGLE APPS SCRIPT ANDA
        const SCRIPT_URL = "ISI_DENGAN_URL_DEPLOYMENT_ANDA";

        let students = [];
        let html5QrCode;
        let currentClass = "";

        async function loadDataFromDatabase() {
            if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbx2mXRVtXxdKMvKuqKvjqQYjEBX_xHAGSP-11UJkRtw07h6JGjzxCbD0XLOx5CpKfpVig/exec") {
                showToast("URL Database Belum Diisi!", "bg-red-500");
                return;
            }
            try {
                showToast("Sinkronisasi Database...", "bg-indigo-500");
                const response = await fetch(SCRIPT_URL);
                students = await response.json();
                updateUI();
                showToast("Data Berhasil Dimuat", "bg-emerald-500");
            } catch (e) {
                showToast("Koneksi Internet Bermasalah", "bg-red-500");
            }
        }

        function updateUI() {
            document.getElementById('statTotalMurid').innerText = students.length;
            document.getElementById('statTotalAbsensi').innerText = students.reduce((a, b) => a + Number(b.attendance), 0);
            renderSummary();
            if(currentClass) renderStudentList(currentClass);
        }

        function renderStudentList(className) {
            currentClass = className;
            const list = document.getElementById('studentList');
            document.getElementById('classContainer').classList.remove('hidden');
            document.getElementById('currentClassName').innerText = "Kelas: " + className;
            list.innerHTML = "";
            
            const filtered = students.filter(s => s.class === className);
            filtered.forEach(s => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-100";
                card.innerHTML = `
                    <div class="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold" onclick="showIDCard('${s.id}')">
                        ${s.name.charAt(0)}
                    </div>
                    <div class="flex-1">
                        <h5 class="font-bold text-gray-800 text-xs">${s.name}</h5>
                        <p class="text-[9px] text-gray-400 font-bold">${s.id}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] font-black text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg">${s.attendance}</span>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function renderSummary() {
            const body = document.getElementById('summaryTableBody');
            body.innerHTML = "";
            [...students].sort((a,b) => b.attendance - a.attendance).forEach(s => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="py-3 px-4 font-bold text-gray-700">${s.name}</td>
                    <td class="py-3 px-4 text-gray-400 font-bold uppercase">${s.class}</td>
                    <td class="py-3 px-4 text-center font-black text-indigo-600">${s.attendance}</td>
                `;
                body.appendChild(row);
            });
        }

        function startScan() {
            document.getElementById('scanModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                async (decodedText) => {
                    await html5QrCode.stop();
                    closeModal('scanModal');
                    processAttendance(decodedText);
                }
            );
        }

        async function processAttendance(id) {
            const student = students.find(s => s.id === id);
            if (!student) {
                showToast("ID TIDAK DIKENAL", "bg-red-500");
                return;
            }

            try {
                showToast(`Mencatat Hadir: ${student.name}`, "bg-indigo-500");
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ id: id })
                });
                
                // Update Lokal agar cepat
                student.attendance = Number(student.attendance) + 1;
                updateUI();
                showToast("ABSENSI BERHASIL!", "bg-emerald-500");
            } catch (e) {
                showToast("Gagal Menyimpan Data", "bg-red-500");
            }
        }

        function showIDCard(id) {
            const s = students.find(x => x.id === id);
            if(!s) return;
            document.getElementById('cardModal').classList.remove('hidden');
            document.getElementById('cardName').innerText = s.name;
            document.getElementById('cardIdText').innerText = s.id;
            document.getElementById('cardClass').innerText = "KELAS " + s.class.toUpperCase();
            JsBarcode("#barcodeCanvas", s.id, { format: "CODE128", width: 2, height: 60, displayValue: false });
        }

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === "Admin" && p === "Berastagi2024") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                lucide.createIcons();
                loadDataFromDatabase();
            } else {
                showToast("Login Gagal!", "bg-red-500");
            }
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl text-[10px] uppercase tracking-widest transition-all duration-300 ${color}`;
            t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2500);
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            if (id === 'scanModal' && html5QrCode) html5QrCode.stop().catch(() => {});
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
