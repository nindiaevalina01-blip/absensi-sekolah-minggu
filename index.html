<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi GPdI Immanuel (Face Scan Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTJI5N49B1H9XmvXqse2ew7Fg9oMglVL2gY79pLgnNegb0xv4tLlgdHU-APG42DYODQQ/exec";

        // State lokal dengan data Eldo Desenta Purba yang sudah ditambahkan
        let students = [
            { 
                id: "light-002", 
                name: "Eldo Desenta Purba", 
                pob: "Berastagi", 
                dob: "2015-01-01", 
                age: "9", 
                edu: "SD Kelas 3", 
                class: "Cahaya", 
                attendance: 5, 
                photo: "001.jpeg" // Menggunakan file lokal sesuai permintaan
            },
            { id: "star-001", name: "Adriel Sembiring", pob: "Berastagi", dob: "2020-05-12", age: "4", edu: "Belum Sekolah", class: "Bintang", attendance: 3, photo: "https://images.unsplash.com/photo-1502033059179-106202452932?w=400&h=400&fit=crop" },
            { id: "light-001", name: "Gracia Tarigan", pob: "Kabanjahe", dob: "2015-08-20", age: "9", edu: "SD Kelas 1-3", class: "Cahaya", attendance: 7, photo: "https://images.unsplash.com/photo-1544126592-807daa215a75?w=400&h=400&fit=crop" },
            { id: "youth-001", name: "Samuel Ginting", pob: "Berastagi", dob: "2010-02-15", age: "14", edu: "SMP", class: "Pra Remaja", attendance: 10, photo: "https://images.unsplash.com/photo-1520341280432-4749d4d7bcf9?w=400&h=400&fit=crop" }
        ];
        
        let currentClass = "";
        let stream = null;
        window.selectedBase64Image = "";

        window.updateGlobalStats = () => {
            const totalStudents = students.length;
            const totalAttendance = students.reduce((acc, curr) => acc + curr.attendance, 0);
            document.getElementById('statTotalMurid').innerText = totalStudents;
            document.getElementById('statTotalAbsensi').innerText = totalAttendance;
        };

        window.downloadPDFReport = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18);
            doc.text("LAPORAN ABSENSI SEKOLAH MINGGU", 14, 20);
            doc.setFontSize(11);
            doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 28);
            const tableData = [];
            const source = currentClass ? students.filter(s => s.class === currentClass) : students;
            source.forEach((s, index) => {
                tableData.push([index + 1, s.id, s.name, s.class, s.attendance + " kali"]);
            });
            doc.autoTable({
                head: [['No', 'ID', 'Nama Murid', 'Kelas', 'Total Hadir']],
                body: tableData,
                startY: 40,
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229] }
            });
            doc.save(`Rekap_Absensi.pdf`);
        };

        window.saveMember = async () => {
            const name = document.getElementById('newName').value.trim();
            const cls = document.getElementById('newClass').value;
            const photo = window.selectedBase64Image;
            if (!name || !cls || !photo) return window.showToast("Data belum lengkap!", "bg-amber-500");
            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerText = "MENGIRIM...";
            const newStudent = {
                method: 'REGISTER',
                id: "ID-" + Date.now(),
                name: name,
                pob: document.getElementById('newPob').value,
                dob: document.getElementById('newDob').value,
                age: document.getElementById('newAge').value,
                edu: document.getElementById('newEducation').value,
                class: cls,
                photo: photo,
                timestamp: new Date().toLocaleString('id-ID')
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newStudent) });
                newStudent.attendance = 0;
                students.push(newStudent);
                window.showToast("Murid Berhasil Didaftar!", "bg-emerald-500");
                window.closeModal('addMemberModal');
                window.updateGlobalStats();
                if (currentClass === cls) window.renderStudentList(cls);
            } catch (e) {
                window.showToast("Gagal simpan", "bg-red-500");
            } finally {
                btn.disabled = false;
                btn.innerText = "SIMPAN DATA";
            }
        };

        window.processScan = async () => {
            const status = document.getElementById('scanStatus');
            const classStudents = students.filter(s => s.class === currentClass);
            if (classStudents.length === 0) return status.innerText = "Data kelas kosong.";
            status.innerHTML = `<div class="flex items-center gap-2 text-indigo-600"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Memindai...</div>`;
            lucide.createIcons();
            setTimeout(async () => {
                const target = classStudents[Math.floor(Math.random() * classStudents.length)];
                const studentIdx = students.findIndex(s => s.id === target.id);
                students[studentIdx].attendance += 1;
                status.innerHTML = `<div class="text-emerald-600 font-bold uppercase text-xs">Berhasil: ${target.name}</div>`;
                window.updateGlobalStats();
                setTimeout(() => {
                    window.closeModal('scanModal');
                    window.renderStudentList(currentClass);
                }, 1500);
            }, 1200);
        };

        window.renderStudentList = (className) => {
            currentClass = className;
            const listEl = document.getElementById('studentList');
            document.getElementById('classContainer').classList.remove('hidden');
            document.getElementById('currentClassName').innerText = "Kelas: " + className;
            listEl.innerHTML = "";
            const filtered = students.filter(s => s.class === className);
            filtered.forEach(s => {
                const percent = Math.min((s.attendance / 12) * 100, 100);
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-100 hover:shadow-md transition-shadow";
                card.innerHTML = `
                    <div class="relative flex-shrink-0">
                        <img src="${s.photo}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=random'" class="w-14 h-14 rounded-2xl object-cover border-2 border-indigo-50">
                        <div class="absolute -top-2 -right-2 bg-indigo-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-lg">${s.attendance}x</div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h5 class="font-bold text-gray-800 text-xs truncate">${s.name}</h5>
                        <p class="text-[9px] text-gray-400 font-bold uppercase mb-2">${s.edu} • ${s.age} THN</p>
                        <div class="w-full bg-gray-100 h-1 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
                listEl.appendChild(card);
            });
            lucide.createIcons();
        };

        window.handleLogin = () => {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === "Admin" && p === "Berastagi2024") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                window.updateGlobalStats();
                lucide.createIcons();
            } else {
                showToast("Login Gagal", "bg-red-500");
            }
        };

        window.previewImage = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imagePreview').src = e.target.result;
                    window.selectedBase64Image = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.startScan = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('scanModal').classList.remove('hidden');
            } catch (e) { showToast("Kamera error", "bg-red-500"); }
        };

        window.closeModal = (id) => {
            document.getElementById(id).classList.add('hidden');
            if (id === 'scanModal' && stream) stream.getTracks().forEach(t => t.stop());
        };

        window.showToast = (msg, color) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-bold z-[100] shadow-xl ${color} opacity-100`;
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .btn-grad { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .camera-box { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 2rem; overflow: hidden; background: #000; border: 4px solid #fff; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-anim { position: absolute; width: 100%; height: 2px; background: #4f46e5; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #4f46e5; }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div id="toast" class="opacity-0 pointer-events-none transition-all duration-300 text-xs uppercase tracking-widest"></div>

    <div id="loginPage" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mx-auto mb-6"><i data-lucide="shield-check" class="w-8 h-8"></i></div>
            <h1 class="text-2xl font-black mb-8 tracking-tight uppercase">Login Admin</h1>
            <div class="space-y-4">
                <input type="text" id="username" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" placeholder="Username" value="Admin">
                <input type="password" id="password" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold" placeholder="Password" value="Berastagi2024">
                <button onclick="handleLogin()" class="w-full btn-grad text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-transform">Masuk</button>
            </div>
        </div>
    </div>

    <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-40 p-5 flex justify-between items-center border-b">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><i data-lucide="database" class="w-4 h-4"></i></div>
                <span class="font-extrabold text-xs uppercase tracking-wider">Dashboard Rekap</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="downloadPDFReport()" class="bg-gray-100 text-gray-600 p-2 rounded-lg hover:bg-gray-200 transition-colors"><i data-lucide="printer" class="w-4 h-4"></i></button>
                <button onclick="location.reload()" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center"><i data-lucide="power" class="w-4 h-4"></i></button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto w-full p-6 space-y-6 pb-24">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-xl flex items-center justify-center"><i data-lucide="users" class="w-5 h-5"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Total Murid</p>
                        <p id="statTotalMurid" class="text-xl font-black">0</p>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-xl flex items-center justify-center"><i data-lucide="check-circle" class="w-5 h-5"></i></div>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Total Absensi</p>
                        <p id="statTotalAbsensi" class="text-xl font-black">0</p>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="renderStudentList('Bintang')" class="flex-shrink-0 px-6 py-4 bg-white rounded-2xl border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex items-center gap-3">
                    <i data-lucide="star" class="w-4 h-4 text-amber-500"></i>
                    <span class="font-bold text-xs uppercase tracking-tighter">Bintang</span>
                </button>
                <button onclick="renderStudentList('Cahaya')" class="flex-shrink-0 px-6 py-4 bg-white rounded-2xl border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex items-center gap-3">
                    <i data-lucide="sun" class="w-4 h-4 text-blue-500"></i>
                    <span class="font-bold text-xs uppercase tracking-tighter">Cahaya</span>
                </button>
                <button onclick="renderStudentList('Pra Remaja')" class="flex-shrink-0 px-6 py-4 bg-white rounded-2xl border-2 border-transparent hover:border-indigo-500 transition-all shadow-sm flex items-center gap-3">
                    <i data-lucide="flame" class="w-4 h-4 text-purple-500"></i>
                    <span class="font-bold text-xs uppercase tracking-tighter">Pra Remaja</span>
                </button>
            </div>

            <div id="classContainer" class="hidden space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 id="currentClassName" class="text-sm font-black text-indigo-900 uppercase italic">Kelas: -</h3>
                    <div class="flex gap-2">
                        <button onclick="document.getElementById('addMemberModal').classList.remove('hidden')" class="bg-emerald-500 text-white p-2.5 rounded-xl shadow-md active:scale-95"><i data-lucide="user-plus" class="w-4 h-4"></i></button>
                        <button onclick="startScan()" class="btn-grad text-white px-5 py-2.5 rounded-xl font-black text-[10px] tracking-widest uppercase flex items-center gap-2 shadow-md active:scale-95"><i data-lucide="scan" class="w-4 h-4"></i> Mulai Absen</button>
                    </div>
                </div>
                <div id="studentList" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </main>
    </div>

    <!-- Scan Modal -->
    <div id="scanModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/90 p-6 backdrop-blur-md">
        <div class="w-full max-w-sm text-center">
            <div class="camera-box mb-6">
                <video id="video" autoplay playsinline muted></video>
                <div class="scan-anim"></div>
            </div>
            <div id="scanStatus" class="text-white/70 text-[10px] font-bold mb-6 min-h-[40px]">Menunggu pendeteksian...</div>
            <div class="flex gap-3">
                <button onclick="processScan()" class="flex-1 btn-grad text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">DETEKSI</button>
                <button onclick="closeModal('scanModal')" class="bg-white/10 text-white px-6 rounded-2xl"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
        </div>
    </div>

    <!-- Modal Tambah Murid -->
    <div id="addMemberModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl max-h-[85vh] overflow-y-auto">
            <h4 class="text-xl font-black mb-6 italic tracking-tight">Form Registrasi Murid</h4>
            <div class="space-y-4">
                <div class="flex flex-col items-center mb-4">
                    <div class="relative group">
                        <img id="imagePreview" src="https://ui-avatars.com/api/?name=?&background=f1f5f9" class="w-24 h-24 rounded-[2rem] object-cover border-4 border-indigo-50">
                        <label class="absolute inset-0 bg-black/40 rounded-[2rem] opacity-0 group-hover:opacity-100 flex items-center justify-center cursor-pointer text-white transition-opacity"><i data-lucide="camera"></i><input type="file" accept="image/*" class="hidden" onchange="previewImage(this)"></label>
                    </div>
                </div>
                <input type="text" id="newName" class="w-full px-5 py-3.5 bg-gray-50 rounded-xl text-sm font-semibold outline-none border-none shadow-inner" placeholder="Nama Lengkap">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="newPob" class="w-full px-5 py-3.5 bg-gray-50 rounded-xl text-xs font-semibold outline-none shadow-inner" placeholder="Tempat Lahir">
                    <input type="date" id="newDob" class="w-full px-5 py-3.5 bg-gray-50 rounded-xl text-[10px] font-semibold outline-none shadow-inner">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="newAge" class="w-full px-5 py-3.5 bg-gray-50 rounded-xl text-xs font-semibold outline-none shadow-inner" placeholder="Usia">
                    <select id="newEducation" class="w-full px-4 py-3.5 bg-gray-50 rounded-xl text-[10px] font-bold shadow-inner">
                        <option value="SD Kelas 3">SD Kelas 3</option>
                        <option value="Belum Sekolah">Belum Sekolah</option>
                        <option value="TK">TK</option>
                        <option value="SD">SD</option>
                        <option value="SMP">SMP</option>
                    </select>
                </div>
                <select id="newClass" class="w-full px-5 py-4 bg-indigo-50 rounded-xl text-xs font-black text-indigo-700 outline-none">
                    <option value="Cahaya">Kelas Cahaya</option>
                    <option value="Bintang">Kelas Bintang</option>
                    <option value="Pra Remaja">Kelas Pra Remaja</option>
                </select>
                <div class="flex gap-3 pt-2">
                    <button id="btnSave" onclick="saveMember()" class="flex-[2] btn-grad text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg">SIMPAN</button>
                    <button onclick="closeModal('addMemberModal')" class="flex-1 bg-gray-100 text-gray-500 rounded-2xl font-bold text-xs uppercase">BATAL</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            lucide.createIcons();
            window.updateGlobalStats();
        }
    </script>
</body>
</html>
