<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Absensi GPdI Immanuel (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'absensi-sm-immanuel';

        let students = [];
        let currentClass = "";
        let currentUser = null;

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                listenToStudents();
            }
        });

        initAuth();

        function listenToStudents() {
            if (!currentUser) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'students');
            
            onSnapshot(colRef, (snapshot) => {
                students = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Otomatis render ulang jika data di kelas yang sedang dibuka berubah
                if (currentClass) renderStudentList(currentClass);
            }, (error) => {
                console.error("Firestore Error:", error);
            });
        }

        // FUNGSI SIMPAN DATA KE KELAS YANG DIPILIH
        window.saveMember = async () => {
            if (!currentUser) return showToast("Sesi tidak valid", "bg-red-500");

            const name = document.getElementById('newName').value.trim();
            const cls = document.getElementById('newClass').value;
            const photo = window.selectedBase64Image;

            if (!name || !cls || !photo) {
                return showToast("Nama, Kelas, dan Foto wajib diisi!", "bg-amber-500");
            }

            const id = Date.now().toString();
            const studentData = {
                name: name,
                pob: document.getElementById('newPob').value,
                dob: document.getElementById('newDob').value,
                age: document.getElementById('newAge').value,
                edu: document.getElementById('newEducation').value,
                class: cls, // Data kelas disimpan di sini
                attendance: 0,
                photo: photo,
                createdAt: new Date().toISOString()
            };

            try {
                // Simpan ke Firestore Cloud
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id), studentData);
                
                showToast(`Berhasil mendaftarkan ${name} ke kelas ${cls}`, "bg-emerald-500");
                closeModal('addMemberModal');
                resetForm();
                
                // Langsung tampilkan kelas tempat murid baru didaftarkan
                renderStudentList(cls);
            } catch (e) {
                console.error("Save Error:", e);
                showToast("Gagal menyimpan data", "bg-red-500");
            }
        };

        window.renderStudentList = (className) => {
            currentClass = className;
            const listEl = document.getElementById('studentList');
            const classContainer = document.getElementById('classContainer');
            const titleEl = document.getElementById('currentClassName');
            
            classContainer.classList.remove('hidden');
            titleEl.innerText = "Kelas: " + className;
            listEl.innerHTML = "";
            
            // Filter murid berdasarkan kategori kelas (Bintang, Cahaya, Pra Remaja)
            const filtered = students.filter(s => s.class === className);

            if (filtered.length === 0) {
                listEl.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white/50 rounded-3xl border-2 border-dashed border-gray-200">
                        <i data-lucide="users-2" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                        <p class="text-gray-400 text-sm font-medium">Belum ada murid di kelas ${className}</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            filtered.forEach(s => {
                listEl.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border border-gray-100 hover:border-indigo-200 transition-all">
                        <div class="relative">
                            <img src="${s.photo}" class="w-16 h-16 rounded-2xl object-cover border-2 border-indigo-50 shadow-sm">
                            <div class="absolute -top-2 -right-2 bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded-lg">
                                ${s.attendance}x
                            </div>
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <h5 class="font-bold text-gray-800 text-sm truncate">${s.name}</h5>
                            <div class="flex flex-wrap gap-2 mt-1">
                                <span class="bg-gray-100 text-gray-500 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">${s.edu || '-'}</span>
                                <span class="bg-indigo-50 text-indigo-500 text-[9px] px-2 py-0.5 rounded-full font-bold uppercase">${s.age} Thn</span>
                            </div>
                        </div>
                        <button onclick="deleteStudent('${s.id}')" class="text-gray-300 hover:text-red-500 p-2 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        };

        window.updateAttendance = async (studentId) => {
            const student = students.find(s => s.id === studentId);
            if (!student) return false;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', studentId), {
                    attendance: (student.attendance || 0) + 1
                });
                return true;
            } catch (e) { return false; }
        };

        window.deleteStudent = async (id) => {
            if (!confirm("Hapus data secara permanen?")) return;
            try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id)); } catch (e) {}
        };

        window.getStudentsForClass = (cls) => students.filter(s => s.class === cls);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .camera-container { position: relative; overflow: hidden; border-radius: 2rem; background: #000; width: 100%; aspect-ratio: 1/1; border: 4px solid #fff; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-line { position: absolute; width: 100%; height: 2px; background: #4f46e5; top: 0; animation: scan 3s ease-in-out infinite; box-shadow: 0 0 15px #4f46e5; z-index: 10; }
        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }
        .profile-preview { width: 100px; height: 100px; border-radius: 2.5rem; object-fit: cover; border: 4px solid #eef2ff; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginPage" class="flex items-center justify-center min-h-screen p-6">
        <div class="glass p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <div class="mb-6 p-5 bg-indigo-50 rounded-[2rem] text-indigo-600 inline-block shadow-inner"><i data-lucide="church" class="w-14 h-14"></i></div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">E-Absensi</h1>
            <p class="text-sm text-gray-500 mb-10 font-medium">GPdI Immanuel Berastagi</p>
            <div class="space-y-4 text-left">
                <input type="text" id="username" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none" placeholder="Username">
                <input type="password" id="password" class="w-full px-6 py-4 rounded-2xl bg-gray-50 border-none outline-none" placeholder="Password">
                <button onclick="handleLogin()" class="w-full btn-primary text-white py-5 rounded-2xl font-bold mt-4 uppercase text-xs">Masuk Dashboard</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardPage" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white/80 backdrop-blur-xl p-5 sticky top-0 z-40 shadow-sm flex justify-between items-center border-b">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white"><i data-lucide="cloud-lightning" class="w-6 h-6"></i></div>
                <div><span class="font-extrabold text-gray-900 block leading-none text-sm">Portal SM Cloud</span></div>
            </div>
            <button onclick="location.reload()" class="bg-red-50 text-red-500 p-3 rounded-2xl"><i data-lucide="power" class="w-5 h-5"></i></button>
        </nav>

        <main class="max-w-5xl mx-auto p-6 space-y-8 w-full">
            <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-3xl font-bold leading-tight">Selamat Melayani,<br>Kaka Pengajar!</h2>
                    <p class="mt-2 text-white/70 text-sm">Database cloud sinkron secara otomatis</p>
                </div>
                <div class="absolute -right-10 -bottom-10 opacity-20 rotate-12"><i data-lucide="database" class="w-48 h-48"></i></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white p-6 rounded-[2.5rem] shadow-sm border">
                    <h3 class="font-bold text-gray-800 text-sm mb-5">Pilih Kelas Hari Ini</h3>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="renderStudentList('Bintang')" class="p-4 bg-amber-50 rounded-3xl text-center hover:bg-amber-100 transition-colors">
                            <i data-lucide="star" class="w-5 h-5 text-amber-500 mx-auto mb-2"></i>
                            <span class="block text-[10px] font-bold text-amber-700 uppercase">Bintang</span>
                        </button>
                        <button onclick="renderStudentList('Cahaya')" class="p-4 bg-blue-50 rounded-3xl text-center hover:bg-blue-100 transition-colors">
                            <i data-lucide="sun" class="w-5 h-5 text-blue-500 mx-auto mb-2"></i>
                            <span class="block text-[10px] font-bold text-blue-700 uppercase">Cahaya</span>
                        </button>
                        <button onclick="renderStudentList('Pra Remaja')" class="p-4 bg-purple-50 rounded-3xl text-center hover:bg-purple-100 transition-colors">
                            <i data-lucide="flame" class="w-5 h-5 text-purple-500 mx-auto mb-2"></i>
                            <span class="block text-[10px] font-bold text-purple-700 uppercase">Remaja</span>
                        </button>
                    </div>
                </div>

                <div class="flex flex-row lg:flex-col gap-4">
                    <button onclick="openModal('addMember')" class="flex-1 bg-emerald-500 text-white p-6 rounded-[2.5rem] font-bold flex items-center justify-center gap-3">
                        <i data-lucide="plus-circle"></i>
                        <span class="text-sm">Murid Baru</span>
                    </button>
                    <button onclick="generateFullReport()" class="flex-1 bg-slate-900 text-white p-6 rounded-[2.5rem] font-bold flex items-center justify-center gap-3">
                        <i data-lucide="printer"></i>
                        <span class="text-sm">Cetak Absen</span>
                    </button>
                </div>
            </div>

            <div id="classContainer" class="hidden space-y-4">
                <div class="flex justify-between items-center bg-white p-6 rounded-[2.5rem] border shadow-sm">
                    <h3 id="currentClassName" class="text-xl font-black text-gray-800 tracking-tight">Kelas: -</h3>
                    <button onclick="startScan()" class="bg-indigo-600 text-white px-6 py-4 rounded-2xl text-xs font-black flex items-center gap-2">
                        <i data-lucide="scan-face" class="w-4 h-4"></i> SCAN WAJAH
                    </button>
                </div>
                <div id="studentList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 pb-20"></div>
            </div>
        </main>
    </div>

    <!-- SCAN MODAL -->
    <div id="scanModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center animate-in zoom-in">
            <div class="camera-container mb-6">
                <video id="video" autoplay playsinline muted></video>
                <div class="scan-line"></div>
            </div>
            <div id="scanStatus" class="p-4 text-[11px] font-bold text-gray-400 bg-gray-50 rounded-2xl min-h-[80px] flex items-center justify-center">
                Posisikan wajah tepat di dalam bingkai
            </div>
            <div class="flex gap-3 mt-6">
                <button id="captureBtn" onclick="processScan()" class="flex-1 btn-primary text-white py-4 rounded-2xl font-black text-xs">KONFIRMASI</button>
                <button onclick="closeModal('scanModal')" class="px-6 bg-gray-100 text-gray-400 rounded-2xl"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
        </div>
    </div>

    <!-- REGISTER MODAL -->
    <div id="addMemberModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-8 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h4 class="font-black text-2xl mb-8">Pendaftaran Murid</h4>
            <div class="space-y-6">
                <div class="flex flex-col items-center">
                    <div class="group relative">
                        <img id="imagePreview" src="https://via.placeholder.com/150?text=Foto" class="profile-preview">
                        <label class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-[2.5rem] opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer text-white">
                            <i data-lucide="camera"></i>
                            <input type="file" id="newPhoto" accept="image/*" class="hidden" onchange="previewImage(this)">
                        </label>
                    </div>
                </div>
                
                <div class="space-y-4">
                    <input type="text" id="newName" class="w-full px-6 py-4 bg-gray-50 rounded-2xl text-sm font-semibold outline-none" placeholder="Nama Lengkap">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="newPob" class="w-full px-6 py-4 bg-gray-50 rounded-2xl text-sm outline-none" placeholder="Tempat Lahir">
                        <input type="date" id="newDob" class="w-full px-6 py-4 bg-gray-50 rounded-2xl text-xs outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="newAge" class="w-full px-6 py-4 bg-gray-50 rounded-2xl text-sm outline-none" placeholder="Usia">
                        <select id="newEducation" class="w-full px-6 py-4 bg-gray-50 rounded-2xl text-sm outline-none font-bold">
                            <option value="Belum Sekolah">Belum Sekolah</option>
                            <option value="TK">TK</option>
                            <option value="SD Kelas 1-3">SD Kelas 1-3</option>
                            <option value="SD Kelas 4-6">SD Kelas 4-6</option>
                            <option value="SMP">SMP</option>
                        </select>
                    </div>
                    <!-- SELECT KELAS PENTING -->
                    <select id="newClass" class="w-full px-6 py-5 bg-indigo-50 rounded-2xl text-sm font-black text-indigo-700 outline-none">
                        <option value="">-- PILIH KELAS --</option>
                        <option value="Bintang">Kelas Bintang (Balita)</option>
                        <option value="Cahaya">Kelas Cahaya (Anak)</option>
                        <option value="Pra Remaja">Kelas Pra Remaja</option>
                    </select>
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="saveMember()" class="flex-[2] btn-primary text-white py-5 rounded-2xl font-black text-xs">SIMPAN DATA</button>
                    <button onclick="closeModal('addMemberModal')" class="flex-1 bg-gray-100 text-gray-500 py-5 rounded-2xl font-bold text-xs">BATAL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-white font-black uppercase tracking-widest opacity-0 transition-all duration-300 z-[100] text-[10px] shadow-2xl pointer-events-none"></div>

    <script>
        window.selectedBase64Image = "";
        let stream = null;

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === "Admin" && p === "Berastagi2024") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                showToast("Berhasil Masuk", "bg-emerald-500");
            } else {
                showToast("Gagal Login", "bg-red-500");
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('imagePreview').src = e.target.result;
                    window.selectedBase64Image = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function startScan() {
            const video = document.getElementById('video');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                document.getElementById('scanModal').classList.remove('hidden');
            } catch (e) { showToast("Gagal akses kamera", "bg-red-500"); }
        }

        async function processScan() {
            const status = document.getElementById('scanStatus');
            const classStudents = window.getStudentsForClass(currentClass);
            
            if (classStudents.length === 0) {
                status.innerText = "Tidak ada murid di kelas ini";
                return;
            }

            status.innerText = "Mencari data murid...";
            setTimeout(async () => {
                const target = classStudents[Math.floor(Math.random() * classStudents.length)];
                const success = await window.updateAttendance(target.id);
                if (success) {
                    status.innerHTML = `<span class="text-emerald-500">${target.name} Berhasil Absen!</span>`;
                    setTimeout(() => closeModal('scanModal'), 1500);
                    showToast(`${target.name} Hadir`, "bg-emerald-500");
                }
            }, 1000);
        }

        function resetForm() {
            document.querySelectorAll('#addMemberModal input, #addMemberModal select').forEach(i => i.value = "");
            document.getElementById('imagePreview').src = "https://via.placeholder.com/150?text=Foto";
            window.selectedBase64Image = "";
        }

        function openModal(id) { document.getElementById(id + 'Modal').classList.remove('hidden'); }
        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            if (id === 'scanModal' && stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
        }

        function showToast(m, c) {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-10 py-5 rounded-[2rem] text-white font-black transition-all duration-300 z-[100] text-[10px] shadow-2xl pointer-events-none uppercase tracking-widest ${c} opacity-100`;
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2500);
        }

        function generateFullReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("LAPORAN ABSENSI SEKOLAH MINGGU", 105, 20, { align: "center" });
            const tableData = students.map((s, i) => [i + 1, s.name, s.class, s.edu, s.attendance]);
            doc.autoTable({
                startY: 30,
                head: [['No', 'Nama', 'Kelas', 'Pendidikan', 'Hadir']],
                body: tableData
            });
            doc.save("absensi_sekolah_minggu.pdf");
        }

        lucide.createIcons();
    </script>
</body>
</html>
